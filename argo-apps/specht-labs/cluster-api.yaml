apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cluster-specht-labs
  namespace: argocd
  # IMPORTANT: No finalizer. Deleting this Argo Application must NOT cascade-delete
  # the Cluster API objects (that would tear down the real Hetzner cluster).
  #finalizers:
  #  - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  destination:
    namespace: default
    server: https://kubernetes.default.svc
  source:
    path: apps/cluster-api/cluster/specht-labs
    repoURL: https://github.com/SpechtLabs/k8s-deployment.git
    targetRevision: main
  syncPolicy:
    automated:
      # selfHeal: reconcile git → cluster automatically (version bumps, ref repoints).
      selfHeal: true
      # prune: MUST stay false. Pruning a Cluster / HetznerCluster / KubeadmControlPlane
      # would destroy the cluster. Resources removed/renamed in git (e.g. the old
      # cpx22 HCloudMachineTemplates after the cx23 swap) are left orphaned and must be
      # deleted by hand once no Machine references them. See bases/cluster-api/README.md.
      prune: false
    syncOptions:
      - CreateNamespace=true
  ignoreDifferences:
    # CAPH populates controlPlaneEndpoint.host from the control-plane load balancer
    # once it is provisioned; git declares it empty (host: ""). Without this, the
    # selfHeal above keeps trying to blank the live endpoint and CAPH keeps refilling
    # it — perpetual OutOfSync churn on the cluster's control-plane endpoint.
    - group: infrastructure.cluster.x-k8s.io
      kind: HetznerCluster
      name: specht-labs
      namespace: default
      jsonPointers:
        - /spec/controlPlaneEndpoint/host
