apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: lgtm
  namespace: argocd
spec:
  generators:
    - list:
        elements:
          - name: mimir
            path: apps/mimir/cluster/specht-labs-v2
            namespace: lgtm
          - name: loki
            path: apps/loki/cluster/specht-labs-v2
            namespace: lgtm
          - name: tempo
            path: apps/tempo/cluster/specht-labs-v2
            namespace: lgtm
          - name: pyroscope
            path: apps/pyroscope/cluster/specht-labs-v2
            namespace: lgtm
          # No in-cluster Grafana on v2: dashboards/datasources are pushed to
          # Grafana Cloud via grafana-operator (see argo-apps monitoring set).
  template:
    metadata:
      name: "{{name}}"
      namespace: argocd
      finalizers:
        - resources-finalizer.argocd.argoproj.io
    spec:
      destination:
        namespace: "{{namespace}}"
        server: https://kubernetes.default.svc
      project: default
      source:
        path: "{{path}}"
        repoURL: https://github.com/SpechtLabs/k8s-deployment.git
        targetRevision: main
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
          - ServerSideApply=true
          - SkipDryRunOnMissingResource=true
