apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: envoy-gateway
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  annotations:
    # Wave 0: installs Gateway API + Envoy Gateway CRDs before cert-manager (wave 1)
    # needs them to enable Gateway API support.
    argocd.argoproj.io/sync-wave: "0"
spec:
  destination:
    namespace: envoy-gateway-system
    server: https://kubernetes.default.svc
  project: default
  source:
    path: kustomize/overlays/specht-labs-v2/envoy-gateway
    repoURL: https://github.com/SpechtLabs/k8s-deployment.git
    targetRevision: main
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      # CRDs and the custom resources that use them ship in one Application; these
      # make the apply order-independent (no client-side dry-run before CRDs exist).
      - ServerSideApply=true
      - SkipDryRunOnMissingResource=true
