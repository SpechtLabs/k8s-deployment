apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: monitoring
  namespace: argocd
spec:
  generators:
    - list:
        elements:
          - name: metrics-server
            path: kustomize/overlays/specht-labs-v2/metrics-server
            namespace: kube-system
          - name: grafana-k8s-monitoring
            path: kustomize/overlays/specht-labs-v2/grafana-k8s-monitoring
            namespace: opentelemetry-operator-system
          - name: grafana-operator
            path: kustomize/overlays/specht-labs-v2/grafana-operator
            namespace: grafana-operator
  template:
    metadata:
      name: "{{name}}"
      namespace: argocd
      finalizers:
        - resources-finalizer.argocd.argoproj.io
    spec:
      destination:
        namespace: "{{namespace}}"
        server: https://kubernetes.default.svc
      project: default
      source:
        path: "{{path}}"
        repoURL: https://github.com/SpechtLabs/k8s-deployment.git
        targetRevision: main
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
          # CRDs and the custom resources that use them ship in one Application
          # (grafana-operator); these make the apply order-independent.
          - ServerSideApply=true
          - SkipDryRunOnMissingResource=true
