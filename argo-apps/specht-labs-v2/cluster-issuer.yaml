apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cluster-issuer
  namespace: argocd
  annotations:
    # Wave 1: kept after envoy-gateway (wave 0) for stable ordering. The solver is now
    # Cloudflare DNS-01 (no Gateway API dependency), but the wave is harmless and avoids
    # churn; the cert-manager webhook is up by this point regardless.
    argocd.argoproj.io/sync-wave: "1"
spec:
  project: default
  destination:
    namespace: default
    server: https://kubernetes.default.svc
  source:
    path: kustomize/overlays/specht-labs-v2/cluster-issuer
    repoURL: https://github.com/SpechtLabs/k8s-deployment.git
    targetRevision: main
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
