apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: network
  namespace: argocd
spec:
  generators:
    - list:
        elements:
          - name: cilium
            path: charts/cilium
            namespace: kube-system
            wave: "-1"
          - name: tailscale
            path: kustomize/overlays/specht-labs-v2/tailscale
            namespace: tailscale
            wave: "-1"
          - name: envoy-gateway
            path: kustomize/overlays/specht-labs-v2/envoy-gateway
            namespace: envoy-gateway-system
            # Wave 0: installs Gateway API + Envoy Gateway CRDs before cert-manager (wave 1)
            # needs them to enable Gateway API support.
            wave: "0"
  template:
    metadata:
      name: "{{name}}"
      namespace: argocd
      annotations:
        argocd.argoproj.io/sync-wave: "{{wave}}"
    spec:
      destination:
        namespace: "{{namespace}}"
        server: https://kubernetes.default.svc
      project: default
      source:
        path: "{{path}}"
        repoURL: https://github.com/SpechtLabs/k8s-deployment.git
        targetRevision: main
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
          # CRDs and the custom resources that use them ship in one Application; these
          # make the apply order-independent (no client-side dry-run before CRDs exist).
          - ServerSideApply=true
          - SkipDryRunOnMissingResource=true
