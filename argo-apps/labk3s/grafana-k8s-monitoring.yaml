apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: grafana-k8s-monitoring
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  destination:
    namespace: monitoring
    server: https://kubernetes.default.svc
  project: default
  source:
    path: apps/grafana-k8s-monitoring/cluster/labk3s
    repoURL: https://github.com/SpechtLabs/k8s-deployment.git
    targetRevision: main
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      # The alloy-crd chart installs the Alloy CRD in the same Application as the
      # Alloy CRs from k8s-monitoring; without this, ArgoCD dry-runs the CRs
      # before the CRD exists and fails ("could not find collectors.grafana.com/
      # Alloy"). Skip the dry-run for not-yet-present CRDs so the CRD applies first.
      - SkipDryRunOnMissingResource=true
  # The Tailscale operator rewrites the egress Service's spec.externalName from
  # the placeholder to the generated proxy (ts-lab-lgtm-egress-*.tailscale.svc).
  # Ignore it so ArgoCD doesn't flag a permanent diff / fight the operator.
  ignoreDifferences:
    - kind: Service
      jsonPointers:
        - /spec/externalName
