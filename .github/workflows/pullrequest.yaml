name: "Pullrequest"

on:
  pull_request:

jobs:
  lint:
    name: "Lint"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - uses: ibiqlik/action-yamllint@v3
        id: lint
        continue-on-error: true
        with:
          file_or_dir: .
          format: standard
          config_file: .yamllint.yml

      - name: single-line
        id: lint-output
        if: steps.lint.outcome != 'success'
        run: |
          echo "logfile=$(sed ':a;N;$!ba;s/\n/{newline}/g' < ${{ steps.lint.outputs.logfile }} )" >> $GITHUB_OUTPUT

      - name: Augment PR with yamllint infos
        uses: actions/github-script@v8.0.0
        if: steps.lint.outcome != 'success'
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const output = `#### yamllint: 📖\`${{ steps.lint.outcome }}\`
            <details><summary>Show results</summary>

            \`\`\`
            ${{ steps.lint-output.outputs.logfile }}
            \`\`\`

            </details>

            __Author:__ @${{ github.actor }},
            __Action:__ \`${{ github.event_name }}\``;

            new_output = output.replace(/{newline}/g, "\n");

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: new_output
            })

      - name: Fail pipeline if previously failed
        if: steps.lint.outcome != 'success'
        run: exit 1

  check:
    name: "kubeconform"
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - uses: jdx/mise-action@v4

      - name: kubeconform
        id: kubeconform
        continue-on-error: true
        run: |
          set +e
          mise run check 2>&1 | tee kubeconform.txt
          rc=${PIPESTATUS[0]}
          echo "kubeconform=$(sed ':a;N;$!ba;s/\n/{newline}/g' < kubeconform.txt)" >> $GITHUB_OUTPUT
          exit $rc

      - name: Augment PR with kubeconform infos
        uses: actions/github-script@v8.0.0
        if: steps.kubeconform.outcome != 'success'
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const output = `#### kubeconform: 📖\`${{ steps.kubeconform.outcome }}\`
            <details><summary>Show results</summary>

            \`\`\`
            ${{ steps.kubeconform.outputs.kubeconform }}
            \`\`\`

            </details>

            __Author:__ @${{ github.actor }},
            __Action:__ \`${{ github.event_name }}\``;

            new_output = output.replace(/{newline}/g, "\n");

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: new_output
            })

      - name: Fail pipeline if previously failed
        if: steps.kubeconform.outcome != 'success'
        run: exit 1
