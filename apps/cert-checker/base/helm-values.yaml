replicaCount: 1
## Config
certchecker:
  loglevel: info
  intervalminutes: 1
  certificates:
    - dns: cedi.dev
    - dns: metallglanz.com
    - dns: argocd.specht-labs.de
    - dns: cert-checker.cedi.dev
    - dns: grafana.specht-labs.de
    - dns: cedric-kienzler.de
    - dns: goldschmiede-metallglanz.de
    - dns: short.cedi.dev
    - dns: ccl.pw
    - dns: dash.ccl.pw
    - dns: hole.elbschloss.xyz
    - dns: kienzler.io
    - dns: hass.elbschloss.xyz
    - dns: nas.elbschloss.xyz
    - dns: stream.elbschloss.xyz
serviceMonitor:
  enabled: true
  additionalLabels:
    instance: primary
grafanaDashboard:
  enabled: false # can be found in components/grafana-dashboards/infrastructure/cert-checker.json
ingress:
  enabled: false
nodeSelector:
  kubernetes.io/arch: amd64
tolerations:
  - key: "arch"
    operator: "Equal"
    value: "amd64"
    effect: "NoSchedule"
# Light polling daemon — cpu request only (no limit avoids throttling),
# memory limit caps runaway growth on the shared cx23 node (2 vCPU/3.9GiB).
resources:
  requests:
    cpu: 25m
    memory: 64Mi
  limits:
    memory: 128Mi
