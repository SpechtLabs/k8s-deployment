{{- if .Values.staticpages.gateway.enabled -}}
{{- $fullName := include "staticpages.fullname" . -}}
{{- $gatewayName := default $fullName .Values.staticpages.gateway.name -}}
{{- $gatewayNamespace := .Values.staticpages.gateway.namespace -}}
{{- $defaultParentRef := dict "name" $gatewayName -}}
{{- if $gatewayNamespace -}}
{{- $_ := set $defaultParentRef "namespace" $gatewayNamespace -}}
{{- end -}}
{{- with .Values.staticpages.gateway.route.sectionName -}}
{{- $_ := set $defaultParentRef "sectionName" . -}}
{{- end -}}
{{- with .Values.staticpages.gateway.route.port -}}
{{- $_ := set $defaultParentRef "port" . -}}
{{- end -}}
{{- $parentRefs := default (list $defaultParentRef) .Values.staticpages.gateway.route.parentRefs -}}
{{- $routeLabels := .Values.staticpages.gateway.route.labels -}}
{{- $routeAnnotations := .Values.staticpages.gateway.route.annotations -}}
{{- $apiHostnames := .Values.staticpages.gateway.api.hostnames -}}
{{- if not $apiHostnames -}}
{{- $apiHostnames = list -}}
{{- range .Values.staticpages.ingress.hosts -}}
{{- $apiHostnames = append $apiHostnames .host -}}
{{- end -}}
{{- end -}}
{{- $proxyHostnames := .Values.staticpages.gateway.proxy.hostnames -}}
{{- if not $proxyHostnames -}}
{{- $proxyHostnames = list -}}
{{- range .Values.configs.pages -}}
{{- $proxyHostnames = append $proxyHostnames .domain -}}
{{- end -}}
{{- end -}}
{{- range .Values.staticpages.gateway.proxy.additionalHostnames -}}
{{- $proxyHostnames = append $proxyHostnames . -}}
{{- end -}}
{{- if and .Values.staticpages.gateway.api.enabled $apiHostnames }}
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ default (printf "%s-api" $fullName) .Values.staticpages.gateway.api.name }}
  labels:
    {{- include "staticpages.labels" . | nindent 4 }}
    {{- with $routeLabels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  {{- with $routeAnnotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  parentRefs:
    {{- range $parentRefs }}
    - {{ toYaml . | nindent 6 | trim }}
    {{- end }}
  hostnames:
    {{- range $apiHostnames }}
    - {{ . | quote }}
    {{- end }}
  rules:
    - matches:
        - path:
            type: {{ .Values.staticpages.gateway.api.path.type }}
            value: {{ .Values.staticpages.gateway.api.path.value | quote }}
      backendRefs:
        - name: {{ $fullName }}-api
          port: {{ .Values.staticpages.service.apiPort }}
{{- end }}
{{- if and .Values.staticpages.gateway.proxy.enabled $proxyHostnames }}
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ default (printf "%s-proxy" $fullName) .Values.staticpages.gateway.proxy.name }}
  labels:
    {{- include "staticpages.labels" . | nindent 4 }}
    {{- with $routeLabels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  {{- with $routeAnnotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  parentRefs:
    {{- range $parentRefs }}
    - {{ toYaml . | nindent 6 | trim }}
    {{- end }}
  hostnames:
    {{- range $proxyHostnames | uniq }}
    - {{ . | quote }}
    {{- end }}
  rules:
    - matches:
        - path:
            type: {{ .Values.staticpages.gateway.proxy.path.type }}
            value: {{ .Values.staticpages.gateway.proxy.path.value | quote }}
      backendRefs:
        - name: {{ $fullName }}-proxy
          port: {{ .Values.staticpages.service.proxyPort }}
{{- end }}
{{- end }}
