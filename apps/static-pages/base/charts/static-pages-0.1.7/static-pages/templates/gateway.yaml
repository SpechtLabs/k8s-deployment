{{- if and .Values.staticpages.gateway.enabled .Values.staticpages.gateway.create -}}
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: {{ default (include "staticpages.fullname" .) .Values.staticpages.gateway.name }}
  labels:
    {{- include "staticpages.labels" . | nindent 4 }}
    {{- with .Values.staticpages.gateway.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  {{- with .Values.staticpages.gateway.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  gatewayClassName: {{ required "staticpages.gateway.gatewayClassName is required when staticpages.gateway.create is true" .Values.staticpages.gateway.gatewayClassName }}
  listeners:
    {{- toYaml .Values.staticpages.gateway.listeners | nindent 4 }}
{{- end }}
