# -- Override the Kubernetes version, which is used to evaluate certain manifests
kubeVersionOverride: ""
# Override APIVersions
# If you want to template helm charts but cannot access k8s API server
# you can set api versions here
apiVersionOverrides:
  # -- String to override apiVersion of cert-manager resources rendered by this helm chart
  certmanager: "" # cert-manager.io/v1
  # -- String to override apiVersion of GKE resources rendered by this helm chart
  cloudgoogle: "" # cloud.google.com/v1
  # -- String to override apiVersion of autoscaling rendered by this helm chart
  autoscaling: "" # autoscaling/v2
  # -- String to override apiVersion of ingresses rendered by this helm chart
  ingress: "" # networking.k8s.io/v1beta1
  # -- String to override apiVersion of pod disruption budgets rendered by this helm chart
  pdb: "" # policy/v1

global:
  # -- Common environment variables to add to all pods directly managed by this chart.
  extraEnv: []

  # -- Common source of environment injections to add to all pods directly managed by this chart.
  # For example to inject values from a Secret, use:
  # extraEnvFrom:
  #   - secretRef:
  #       name: mysecret
  extraEnvFrom: []

s3:
  # -- S3 credentials to be used by the static pages proxy
  # -- The secret name must be the same as the one used in the static pages config
  # -- The secret key must be the same as the one used in the static pages config
  # -- The secret value must be base64 encoded
  app-id: ""
  s3-secret: ""

staticpages:
  nameOverride: ""

  replicaCount: 1
  autoscaling:
    enabled: false
    minReplicas: 1
    maxReplicas: 5
    targetCPUUtilizationPercentage: 80
    targetMemoryUtilizationPercentage: 80

  image:
    repository: ghcr.io/spechtlabs/staticpages
    pullPolicy: Always
    # Overrides the image tag whose default is the chart appVersion.
    tag: ""

  # -- Value reported as service.version in telemetry (OTEL_SERVICE_VERSION).
  # Defaults to the chart appVersion when empty.
  otelServiceVersion: ""

  # Extra env variables to pass to the StaticPages container
  env: []
  extraEnvFrom: []

  imagePullSecrets: []

  serviceAccount:
    # Specifies whether a service account should be created
    create: true
    # Annotations to add to the service account
    annotations: {}
    # The name of the service account to use.
    # If not set and create is true, a name is generated using the fullname template
    name: ""

  podAnnotations: {}

  podSecurityContext:
    runAsNonRoot: true

  securityContext:
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: true
    runAsNonRoot: true
    runAsUser: 1000
    # capabilities:
    #   drop:
    #   - ALL

  service:
    proxyPort: 8080
    apiPort: 8081

  ingress:
    enabled: false
    className: ""
    annotations: {}
    hosts:
      - host: example.com
        paths:
          - path: /api
            pathType: ImplementationSpecific
    tls:
      - secretName: chart-example-local-tls
        hosts:
          - example.com

  gateway:
    # -- Enable Gateway API HTTPRoutes for StaticPages.
    enabled: false
    # -- Create a Gateway resource in this chart. Set to false to attach routes to an existing Gateway.
    create: false
    # -- Gateway name. Defaults to the chart fullname when empty.
    name: ""
    # -- Namespace of the parent Gateway. Empty means the release namespace.
    namespace: ""
    # -- GatewayClass name used when gateway.create is true.
    gatewayClassName: ""
    # -- Labels to add to the Gateway when gateway.create is true.
    labels: {}
    # -- Annotations to add to the Gateway when gateway.create is true.
    annotations: {}
    # -- Gateway listeners rendered when gateway.create is true.
    listeners:
      - name: http
        protocol: HTTP
        port: 80
        allowedRoutes:
          namespaces:
            from: Same
    route:
      # -- Labels to add to generated HTTPRoutes.
      labels: {}
      # -- Annotations to add to generated HTTPRoutes.
      annotations: {}
      # -- ParentRefs for generated HTTPRoutes. When empty, the chart uses gateway.name/namespace.
      parentRefs: []
      # -- Section name on the parent Gateway listener.
      sectionName: ""
      # -- Port on the parent Gateway listener. Pin this (e.g. 443) to attach routes to a
      # specific listener only — useful when a shared Gateway has both an HTTP (:80) and an
      # HTTPS (:443) listener and a separate platform route handles the :80 -> :443 redirect.
      port: null
    api:
      # -- Enable the management API HTTPRoute.
      enabled: true
      # -- Name of the management API HTTPRoute. Defaults to "<fullname>-api".
      name: ""
      # -- Hostnames for the management API route. Defaults to staticpages.ingress.hosts[].host.
      hostnames: []
      path:
        type: PathPrefix
        value: /api
      # -- Raw HTTPRoute rules. When set, replaces the default path->api-backend rule, giving
      # full Gateway API expressiveness (filters, multiple matches, weights, timeouts).
      rules: []
    proxy:
      # -- Enable the page proxy HTTPRoute.
      enabled: true
      # -- Name of the page proxy HTTPRoute. Defaults to "<fullname>-proxy".
      name: ""
      # -- Hostnames for the page proxy route. Defaults to configs.pages[].domain.
      hostnames: []
      # -- Extra hostnames for the page proxy route, such as wildcard preview hosts.
      additionalHostnames: []
      # -- Auto-derive wildcard hostnames for branch/preview hosts (<branch>.domain.tld).
      # One of:
      #   none      - no wildcards (default)
      #   perDomain - emit *.<domain> for every resolved hostname (single-label previews
      #               per domain; e.g. pages.specht-labs.de -> *.pages.specht-labs.de)
      #   apex      - emit *.<last-two-labels> (collapses subdomains;
      #               e.g. pages.specht-labs.de -> *.specht-labs.de).
      #               NOTE: naive last-two-labels; wrong for multi-part TLDs like co.uk.
      # Gateway API wildcards are single-label and only program where they intersect a
      # parent listener hostname.
      wildcardHostnames: none
      path:
        type: PathPrefix
        value: /
      # -- Raw HTTPRoute rules. When set, replaces the default path->proxy-backend rule, giving
      # full Gateway API expressiveness (filters, multiple matches, weights, timeouts).
      rules: []

  resources:
    {}
    # We usually recommend not to specify default resources and to leave this as a conscious
    # choice for the user. This also increases chances charts run on environments with little
    # resources, such as Minikube. If you do want to specify resources, uncomment the following
    # lines, adjust them as necessary, and remove the curly braces after 'resources:'.
    # limits:
    #   cpu: 500m
    #   memory: 128Mi
    # requests:
    #   cpu: 10m
    #   memory: 64Mi

  terminationGracePeriodSeconds: 10

  # -- Additional command line arguments to pass to application controller
  extraArgs: []

  ## Application controller Pod Disruption Budget
  ## Ref: https://kubernetes.io/docs/tasks/run-application/configure-pdb/
  pdb:
    # -- Deploy a [PodDisruptionBudget] for the application controller
    enabled: true
    # -- Labels to be added to application controller pdb
    labels: {}
    # -- Annotations to be added to application controller pdb
    annotations: {}
    # -- Number of pods that are available after eviction as number or percentage (eg.: 50%)
    # @default -- `""` (defaults to 0 if not specified)
    minAvailable: 1
    # -- Number of pods that are unavailble after eviction as number or percentage (eg.: 50%).
    ## Has higher precedence over `controller.pdb.minAvailable`
    maxUnavailable: ""

  nodeSelector: {}

  tolerations: []

  affinity: {}

  ## Application controller metrics configuration
  metrics:
    # -- Deploy metrics service
    enabled: false
    service:
      # -- Metrics service annotations
      annotations: {}
      # -- Metrics service labels
      labels: {}
      # -- Metrics service port
      servicePort: 8082
      # -- Metrics service port name
      portName: http-metrics
    serviceMonitor:
      # -- Enable a prometheus ServiceMonitor
      enabled: false
      # -- Prometheus ServiceMonitor interval
      interval: 30s
      # -- Prometheus [RelabelConfigs] to apply to samples before scraping
      relabelings: []
      # -- Prometheus [MetricRelabelConfigs] to apply to samples before ingestion
      metricRelabelings: []
      # -- Prometheus ServiceMonitor selector
      selector:
        {}
        # prometheus: kube-prometheus

      # -- Prometheus ServiceMonitor scheme
      scheme: ""
      # -- Prometheus ServiceMonitor tlsConfig
      tlsConfig: {}
      # -- Prometheus ServiceMonitor namespace
      namespace: "" # "monitoring"
      # -- Prometheus ServiceMonitor labels
      additionalLabels: {}
      # -- Prometheus ServiceMonitor annotations
      annotations: {}
    rules:
      # -- Deploy a PrometheusRule for the application controller
      enabled: false
      # -- PrometheusRule.Spec for the application controller
      # spec:
      #   - alert: UrlShortenerHighVolume
      #     expr: |
      #       irate(urlshortener_shortlink_invocation[1m]) > 5
      #     for: 15m
      #     labels:
      #       severity: critical
      #     annotations:
      #       summary: "[URL Shortener] High rps to shortlink {{`{{$labels.name}}`}}"
      #       description: The urlshortener saw an intense amount of calls to the {{`{{$labels.name}}`}} shortlink over a period of 15 minutes
      # selector:
      #   prometheus: kube-prometheus
      # namespace: monitoring
      # additionalLabels: {}
      # annotations: {}

# Static Pages Config
configs:
  proxy:
    maxIdleConns: 1000
    maxIdleConnsPerHost: 500
    timeout: 30s
    compression: false

  output:
