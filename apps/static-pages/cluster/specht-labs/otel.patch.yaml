# v2 telemetry: send OTLP to the cluster's Grafana Alloy receiver (Grafana Cloud) and let
# Grafana Alloy scrape Prometheus metrics by pod annotation. The shared base points at the
# v1 self-hosted Tempo (tempo-distributor.observability:4317), which does not exist on v2;
# this overlay patch overrides it without touching the base (v1 keeps the Tempo endpoint).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: static-pages
spec:
  template:
    metadata:
      annotations:
        # v2 has no ServiceMonitor/Prometheus-operator discovery. Grafana Alloy's annotation
        # autodiscovery scrapes the pod directly. StaticPages serves /metrics (gin-prometheus)
        # on the API gin router, i.e. the API port 8081 — NOT a separate metrics port.
        k8s.grafana.com/scrape: "true"
        k8s.grafana.com/metrics.portNumber: "8081"
        k8s.grafana.com/metrics.path: "/metrics"
        k8s.grafana.com/metrics.scheme: "http"
    spec:
      containers:
        - name: static-pages
          env:
            # go-otel-utils WithTraceAutomaticEnv picks the OTLP transport by whether the
            # endpoint string contains "4317" (gRPC) or "4318" (HTTP), then passes the value
            # straight to otlptracehttp.WithEndpoint — so NO scheme prefix. WithEndpoint
            # defaults to HTTPS, so OTEL_EXPORTER_OTLP_INSECURE=true (kept from the base) is
            # required for plaintext to the in-cluster receiver.
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: grafana-k8s-monitoring-alloy-receiver.monitoring.svc.cluster.local:4318
            # POD_NAME/POD_NAMESPACE feed OTEL_RESOURCE_ATTRIBUTES below. Listed before it so
            # the $(VAR) references resolve (env interpolation only sees earlier entries).
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: OTEL_SERVICE_NAME
              value: static-pages
            # service.namespace is what Application Observability keys the service entity on
            # and filters its Traces tab by; k8s.* link telemetry to the pod. resource.Default()
            # reads OTEL_RESOURCE_ATTRIBUTES via the env detector.
            - name: OTEL_RESOURCE_ATTRIBUTES
              value: service.namespace=$(POD_NAMESPACE),k8s.namespace.name=$(POD_NAMESPACE),k8s.pod.name=$(POD_NAME)
