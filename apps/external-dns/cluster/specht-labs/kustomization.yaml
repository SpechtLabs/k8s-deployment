apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: external-dns

# external-dns is v2-only, so (like cert-manager) we inflate the chart directly in the overlay
# instead of sharing a base. It runs source=service and only manages the hostnames annotated onto
# the two Envoy LB services (see ../envoy-gateway) -> no per-hostname records from Routes/Gateways.
helmCharts:
  - name: external-dns
    repo: https://kubernetes-sigs.github.io/external-dns/
    version: 1.21.1
    releaseName: external-dns
    namespace: external-dns
    valuesFile: helm-values.yaml

# Reuses the same Cloudflare API token as the cert-manager DNS-01 issuer (copied, SOPS-encrypted).
generators:
  - ./secret-generator.yaml
