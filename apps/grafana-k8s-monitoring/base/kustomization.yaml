apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: monitoring

helmCharts:
  - name: k8s-monitoring
    repo: https://grafana.github.io/helm-charts
    version: 4.2.2
    releaseName: grafana-k8s-monitoring
    namespace: monitoring
    valuesFile: helm-values.yaml

  - name: alloy-crd
    repo: https://grafana.github.io/helm-charts
    version: 1.0.1
    releaseName: grafana-alloy-crd
    namespace: monitoring

patches:
  # The feature-auto-instrumentation chart hard-codes cpu:3 in beyla-k8s-cache limits.
  # Helm's deep-merge cannot remove a key set by chart defaults (null rejected by values schema),
  # so we strip it here after rendering.
  - target:
      kind: Deployment
      name: beyla-k8s-cache
    patch: |
      - op: remove
        path: /spec/template/spec/containers/0/resources/limits/cpu
