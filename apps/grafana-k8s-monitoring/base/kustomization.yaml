apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: monitoring

helmCharts:
  - name: k8s-monitoring
    repo: https://grafana.github.io/helm-charts
    version: 4.1.6
    releaseName: grafana-k8s-monitoring
    namespace: monitoring
    valuesFile: helm-values.yaml

  - name: alloy-crd
    repo: https://grafana.github.io/helm-charts
    version: 1.0.0
    releaseName: grafana-alloy-crd
    namespace: monitoring

patches:
  # OpenCost chart bug: telemetry-services ships a default
  # exporter.extraEnv.CONFIG_PATH=/tmp, and customPricing.enabled (see
  # helm-values.yaml) also emits CONFIG_PATH — set to customPricing.configPath
  # (/tmp/custom-config), the writable emptyDir where OpenCost materialises the
  # pricing model fetched from PRICING_CONFIGMAP_NAME. Two CONFIG_PATH env
  # entries break Argo/SSA ("duplicate entries for key [name=CONFIG_PATH]").
  # Helm can't drop the chart default (map-merge won't delete; the values
  # schema rejects null), so strip the redundant /tmp entry post-render and
  # keep customPricing's /tmp/custom-config. The test ops make a chart bump
  # that reorders env fail loudly instead of removing the wrong var.
  - target:
      kind: Deployment
      name: grafana-k8s-monitoring-opencost
    patch: |-
      - op: test
        path: /spec/template/spec/containers/0/env/22/name
        value: CONFIG_PATH
      - op: test
        path: /spec/template/spec/containers/0/env/22/value
        value: /tmp
      - op: remove
        path: /spec/template/spec/containers/0/env/22
