apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: monitoring

helmCharts:
  - name: k8s-monitoring
    repo: https://grafana.github.io/helm-charts
    version: 4.1.6
    releaseName: grafana-k8s-monitoring
    namespace: monitoring
    valuesFile: helm-values.yaml

  - name: alloy-crd
    repo: https://grafana.github.io/helm-charts
    version: 1.0.0
    releaseName: grafana-alloy-crd
    namespace: monitoring
