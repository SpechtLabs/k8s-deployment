cluster:
  name: specht-labs
global:
  # Pin metrics collection to 1/min. Keeps self-hosted Mimir series churn and
  # block storage down; also the chart default, set explicitly so a chart bump
  # can't silently lower it.
  scrapeInterval: 60s
destinations:
  # Self-hosted LGTM on this cluster (lgtm namespace), tenant `spechtlabs`.
  # In-cluster writes, no auth; tenantId sets X-Scope-OrgID (Mimir/Loki/Tempo/
  # Pyroscope all run multitenancy). Plain HTTP — traffic stays on the cluster network.
  selfhosted-mimir:
    type: prometheus
    url: http://mimir-gateway.lgtm.svc.cluster.local/api/v1/push
    tenantId: spechtlabs
    metricProcessingRules: |
      write_relabel_config {
        regex = "container_id|image_id"
        action = "labeldrop"
      }
  selfhosted-loki:
    type: loki
    url: http://loki-gateway.lgtm.svc.cluster.local/loki/api/v1/push
    tenantId: spechtlabs
  selfhosted-tempo:
    type: otlp
    url: http://tempo-distributor.lgtm.svc.cluster.local:4318
    protocol: http
    tenantId: spechtlabs
    metrics:
      enabled: false
    logs:
      enabled: false
    traces:
      enabled: true
  selfhosted-pyroscope:
    type: pyroscope
    url: http://pyroscope.lgtm.svc.cluster.local:4040
    tenantId: spechtlabs
clusterMetrics:
  enabled: true
  collector: alloy-metrics
  destinations: [selfhosted-mimir]
hostMetrics:
  enabled: true
  collector: alloy-metrics
  destinations: [selfhosted-mimir]
  linuxHosts:
    enabled: true
  windowsHosts:
    enabled: false
  energyMetrics:
    enabled: false
costMetrics:
  enabled: true
  collector: alloy-metrics
  destinations: [selfhosted-mimir]
annotationAutodiscovery:
  enabled: true
  collector: alloy-metrics
  destinations: [selfhosted-mimir]
prometheusOperatorObjects:
  enabled: true
  collector: alloy-metrics
  destinations: [selfhosted-mimir]
clusterEvents:
  enabled: true
  collector: alloy-singleton
  destinations: [selfhosted-loki]
nodeLogs:
  enabled: true
  collector: alloy-logs
  destinations: [selfhosted-loki]
podLogsViaLoki:
  enabled: true
  collector: alloy-logs
  destinations: [selfhosted-loki]
kubernetesManifests:
  enabled: true
  collector: alloy-singleton
  destinations: [selfhosted-loki]
applicationObservability:
  enabled: true
  collector: alloy-receiver
  # App metrics -> Mimir, logs -> Loki, traces -> Tempo.
  destinations: [selfhosted-mimir, selfhosted-loki, selfhosted-tempo]
  receivers:
    otlp:
      grpc:
        enabled: true
        port: 4317
      http:
        enabled: true
        port: 4318
    zipkin:
      enabled: true
      port: 9411
autoInstrumentation:
  enabled: true
  collector: alloy-metrics
  # Beyla RED -> Mimir; Beyla traces flow via applicationObservability -> Tempo.
  destinations: [selfhosted-mimir]
  beyla:
    deliverTracesToApplicationObservability: true
    resources:                    # beyla DaemonSet container; peaks ~800Mi on this node set
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        memory: 1Gi               # OOM guardrail; no cpu limit (avoids eBPF throttling)
    k8sCache:                     # beyla-k8s-cache Deployment; chart default includes cpu:3 limit
      resources:                  # cpu limit is removed via kustomize patch (can't null-out via Helm values schema)
        requests:
          cpu: 100m
          memory: 256Mi
        limits:
          memory: 512Mi
profiling:
  enabled: true
  collector: alloy-profiles
  # Auto-routes to the sole pyroscope-type destination (selfhosted-pyroscope);
  # the feature takes no explicit `destinations` list.
  ebpf:
    enabled: true
collectors:
  alloy-metrics:
    presets:
      - clustered
      - statefulset
    alloy:
      resources:
        requests:
          cpu: 100m
          memory: 128Mi
        limits:
          memory: 512Mi
    configReloader:
      resources:
        requests:
          cpu: 10m
          memory: 50Mi
        limits:
          memory: 64Mi
  alloy-singleton:
    presets:
      - singleton
    alloy:
      resources:
        requests:
          cpu: 25m
          memory: 64Mi
        limits:
          memory: 256Mi
    configReloader:
      resources:
        requests:
          cpu: 10m
          memory: 50Mi
        limits:
          memory: 64Mi
  alloy-logs:
    presets:
      - filesystem-log-reader
      - daemonset
    alloy:
      resources:
        requests:
          cpu: 50m
          memory: 64Mi
        limits:
          memory: 256Mi
    configReloader:
      resources:
        requests:
          cpu: 10m
          memory: 50Mi
        limits:
          memory: 64Mi
  alloy-receiver:
    presets:
      - deployment
    alloy:
      resources:
        requests:
          cpu: 50m
          memory: 64Mi
        limits:
          memory: 256Mi
    configReloader:
      resources:
        requests:
          cpu: 10m
          memory: 50Mi
        limits:
          memory: 64Mi
  alloy-profiles:
    presets:
      - privileged
      - daemonset
    alloy:
      resources:
        requests:
          cpu: 100m
          memory: 128Mi
        limits:
          memory: 384Mi
    configReloader:
      resources:
        requests:
          cpu: 10m
          memory: 50Mi
        limits:
          memory: 64Mi
# collectorCommon.alloy.remoteConfig (Grafana Cloud Fleet Management) removed —
# no self-hosted equivalent; collectors run their rendered config.
alloy-operator:
  resources:                      # alloy-operator Deployment
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      memory: 256Mi
  waitForAlloyRemoval:
    resources:                    # add-finalizer + remove-alloy-and-finalizer Jobs (kubectl one-shots)
      requests:
        cpu: 10m
        memory: 32Mi
      limits:
        memory: 128Mi
telemetryServices:
  kube-state-metrics:
    deploy: true
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        memory: 256Mi
  node-exporter:
    deploy: true
    resources:
      requests:
        cpu: 50m
        memory: 32Mi
      limits:
        memory: 128Mi
  windows-exporter:
    deploy: false
  opencost:
    deploy: true
    metricsSource: selfhosted-mimir
    opencost:
      exporter:
        defaultClusterId: specht-labs
        # Mimir runs multitenancy_enabled: true — OpenCost must send the tenant
        # org id on its PromQL queries or Mimir answers 401. Setting this also
        # overrides the wrapper's default CONFIG_PATH=/tmp, removing the duplicate
        # CONFIG_PATH that the (now-deleted) base kustomization patch guarded against.
        # Upgrade guard: that dedup is now implicit (no CI-time assertion). On a
        # k8s-monitoring chart bump, re-check the rendered OpenCost container has
        # exactly one CONFIG_PATH (=/tmp/custom-config):
        #   kustomize build --enable-helm apps/grafana-k8s-monitoring/base \
        #     | yq 'select(.kind=="Deployment" and (.metadata.name|test("opencost$")))
        #           .spec.template.spec.containers[0].env[] | select(.name=="CONFIG_PATH")'
        # If a second (=/tmp) reappears, SSA rejects the apply — restore the dedup patch.
        extraEnv:
          PROMETHEUS_HEADER_X_SCOPE_ORGID: spechtlabs
      prometheus:
        # Mimir's PromQL API lives under /prometheus (not the /api/v1/push write path).
        external:
          url: http://mimir-gateway.lgtm.svc.cluster.local/prometheus
      customPricing:
        enabled: true
        costModel:
          description: Hetzner Cloud CPX22 pricing, net EUR.
          CPU: 0.0032
          RAM: 0.0016
          GPU: 0
          storage: 0
          zoneNetworkEgress: 0
          regionNetworkEgress: 0
          internetNetworkEgress: 1
  kepler:
    deploy: false
  k8s-manifest-tail:
    deploy: true
    resources:
      requests:
        cpu: 25m
        memory: 32Mi
      limits:
        memory: 128Mi
    config:
      objects:
        - apiVersion: v1
          kind: Pod
        - apiVersion: apps/v1
          kind: Deployment
        - apiVersion: apps/v1
          kind: StatefulSet
        - apiVersion: apps/v1
          kind: DaemonSet
