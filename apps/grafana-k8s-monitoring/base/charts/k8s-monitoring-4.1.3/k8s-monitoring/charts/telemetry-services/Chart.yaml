apiVersion: v2
appVersion: 1.0.0
dependencies:
- condition: kepler.deploy
  name: kepler
  repository: https://sustainable-computing-io.github.io/kepler-helm-chart
  version: 0.6.1
- alias: node-exporter
  condition: node-exporter.deploy
  name: prometheus-node-exporter
  repository: https://prometheus-community.github.io/helm-charts
  version: 4.55.0
- alias: windows-exporter
  condition: windows-exporter.deploy
  name: prometheus-windows-exporter
  repository: https://prometheus-community.github.io/helm-charts
  version: 0.12.6
- condition: kube-state-metrics.deploy
  name: kube-state-metrics
  repository: https://prometheus-community.github.io/helm-charts
  version: 7.3.0
- condition: opencost.deploy
  name: opencost
  repository: https://opencost.github.io/opencost-helm-chart
  version: 2.5.14
- alias: k8s-manifest-tail
  condition: k8s-manifest-tail.deploy
  name: k8s-manifest-tail
  repository: https://grafana.github.io/helm-charts
  version: 0.1.4
description: Additional Deployments to generate observability telemetry data
icon: https://raw.githubusercontent.com/grafana/grafana/main/public/img/grafana_icon.svg
maintainers:
- email: pete.wall@grafana.com
  name: petewall
name: telemetry-services
sources:
- https://github.com/grafana/k8s-monitoring-helm/tree/main/charts/k8s-monitoring/charts/telemetry-services
version: 1.0.0
