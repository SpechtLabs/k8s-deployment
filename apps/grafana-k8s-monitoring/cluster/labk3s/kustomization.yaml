apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: monitoring

# labk3s inflates the chart itself (rather than reusing ../../base) because its
# config is wholly different from specht-labs's: no Grafana Cloud, no OpenCost,
# no PDC — everything ships to the self-hosted LGTM stack on v2 over the tailnet.
helmCharts:
  - name: k8s-monitoring
    repo: https://grafana.github.io/helm-charts
    version: 4.1.6
    releaseName: grafana-k8s-monitoring
    namespace: monitoring
    valuesFile: helm-values.yaml

  - name: alloy-crd
    repo: https://grafana.github.io/helm-charts
    version: 1.0.0
    releaseName: grafana-alloy-crd
    namespace: monitoring
    # The chart ships the Alloy CRD in crds/, which kustomize's helm inflation
    # omits by default — so the CRD was never applied and the alloy-operator
    # crashlooped ("collectors.grafana.com/v1alpha1: no matches"). Render it.
    includeCRDs: true

resources:
  - ./egress.service.yaml
