apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: monitoring

resources:
  - ../../base

generators:
  - ./secret-generator.yaml

patches:
  - target:
      kind: ServiceMonitor
      name: hcloud-exporter
    patch: |-
      - op: replace
        path: "/spec/namespaceSelector/matchNames/0"
        value: monitoring
