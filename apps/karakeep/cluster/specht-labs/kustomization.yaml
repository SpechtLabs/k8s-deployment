apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: karakeep

resources:
  - ../../base
  - ingress.yaml

generators:
  - ./secret-generator.yaml

patches:
  - target:
      kind: Service
      name: web
    patch: |-
      - op: replace
        path: /spec/type
        value: ClusterIP

  - path: configuration.yaml