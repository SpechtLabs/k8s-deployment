# Real Let's Encrypt cert for argocd-server. With TLS passthrough the gateway does not
# terminate, so argocd-server serves this itself: it auto-loads the well-known
# `argocd-server-tls` secret.
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: argocd-server-tls
  namespace: argocd
spec:
  secretName: argocd-server-tls
  dnsNames:
    - argocd.k8s.specht-labs.de
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
    group: cert-manager.io
