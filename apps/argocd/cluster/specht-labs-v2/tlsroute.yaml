# Routes SNI argocd.k8s.specht-labs.de from the private tailnet Gateway's passthrough
# listener to argocd-server, which terminates TLS itself (keeps gRPC + REST working on one port).
# Route and backend are both in the argocd namespace, so no ReferenceGrant is needed;
# attaching to the Gateway in envoy-gateway-system is allowed by that listener's
# allowedRoutes.namespaces.from: All.
apiVersion: gateway.networking.k8s.io/v1alpha2
kind: TLSRoute
metadata:
  name: argocd
  namespace: argocd
spec:
  parentRefs:
    - name: tailnet
      namespace: envoy-gateway-system
      sectionName: tls
  hostnames:
    - argocd.k8s.specht-labs.de
  rules:
    - backendRefs:
        - name: argocd-server
          port: 443
