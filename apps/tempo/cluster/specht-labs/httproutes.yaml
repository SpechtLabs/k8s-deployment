# One HTTPRoute per tenant on the tailnet-only Gateway. Each injects the tenant's
# X-Scope-OrgID so OTLP/HTTP clients need no custom-header config.
#
# Backend is the tempo-distributor Service on its OTLP/HTTP port (4318), not the
# tempo-gateway: the OTLP/HTTP receiver lives on the distributor, and routing to
# it directly avoids depending on the gateway nginx proxying /v1/traces. OTLP/gRPC
# (4317) would need a GRPCRoute on a gRPC listener and is out of scope here.
# Route + backend are both in lgtm, so no ReferenceGrant is needed.
#
# parentRefs group/kind, backendRefs group/kind/weight, and the default `/`
# PathPrefix match are written out explicitly: the Gateway API webhook defaults
# them on the live object, so omitting them leaves ArgoCD permanently OutOfSync.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: tempo-homelab
  namespace: lgtm
spec:
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: tailnet
      namespace: envoy-gateway-system
      sectionName: http
  hostnames:
    - homelab-tempo.k8s.specht-labs.de
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      filters:
        - type: RequestHeaderModifier
          requestHeaderModifier:
            set:
              - name: X-Scope-OrgID
                value: homelab
      backendRefs:
        - group: ""
          kind: Service
          name: tempo-distributor
          port: 4318
          weight: 1
---
