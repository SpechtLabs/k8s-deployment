# specht-labs's own in-cluster traces (OTLP from the otel-collector / alloy
# receiver when later repointed here). This route only adds external write access
# to the spechtlabs tenant.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: tempo-spechtlabs
  namespace: lgtm
spec:
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: tailnet
      namespace: envoy-gateway-system
      sectionName: http
  hostnames:
    - spechtlabs-tempo.k8s.specht-labs.de
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      filters:
        - type: RequestHeaderModifier
          requestHeaderModifier:
            set:
              - name: X-Scope-OrgID
                value: spechtlabs
      backendRefs:
        - group: ""
          kind: Service
          name: tempo-distributor
          port: 4318
          weight: 1
