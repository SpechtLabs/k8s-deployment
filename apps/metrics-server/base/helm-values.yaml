metrics:
  enabled: true

# Control-plane kubelets serve a self-signed cert without IP SANs (they don't do
# serverTLSBootstrap like the workers), so metrics-server's TLS verification of
# https://<nodeIP>:10250 fails for them. Skip kubelet cert verification.
# Appended after the chart's defaultArgs.
args:
  - --kubelet-insecure-tls

serviceMonitor:
  enabled: true
  interval: 60s

  additionalLabels:
    instance: primary
