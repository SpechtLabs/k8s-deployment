# Static Pages overview dashboard delivered to Grafana Cloud. JSON lives once in
# bases/grafana-dashboards/static-pages/ and is delivered here via configMapRef
# (ConfigMap generated by that base). instanceSelector binds it to the external
# Grafana Cloud instance defined in grafana.yaml; folderRef co-locates it with
# the Static Pages health-check alerts in the "Applications" folder.
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDashboard
metadata:
  name: static-pages-overview
spec:
  instanceSelector:
    matchLabels:
      dashboards: grafana-cloud
  folderRef: applications
  configMapRef:
    name: static-pages-overview-json
    key: static-pages.json
