# External Grafana = the Grafana Cloud stack. grafana-operator does not run a
# Grafana here; it pushes dashboards to Grafana Cloud via the service-account
# token in the grafana-cloud-sa Secret (SOPS-encrypted, see secret-generator.yaml).
apiVersion: grafana.integreatly.org/v1beta1
kind: Grafana
metadata:
  name: grafana-cloud
  labels:
    dashboards: grafana-cloud
spec:
  external:
    url: https://spechtlabs.grafana.net
    apiKey:
      name: grafana-cloud-sa
      key: token
