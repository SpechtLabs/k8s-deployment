# Static Pages HEALTH TARGETS — instantaneous, binary health checks delivered to
# Grafana Cloud as Grafana-managed alert rules via grafana-operator.
#
# These are deliberately NOT the SLO burn-rate alerts: the availability/latency
# SLOs live in the Grafana Cloud SLO plugin (synced via `gcx slo definitions
# push`, see ../../../../grafana/slos/) which auto-generates its own fast/slow
# burn alerts. Health targets answer "is it healthy right now?"; the SLOs answer
# "have we been good enough over 28 days?". See docs/static-pages-slos.md.
#
# All queries are verified against grafanacloud-prom, service_name/job
# "static-pages". probe_ssl_earliest_cert_expiry currently has no data, so a
# cert-expiry health target is intentionally omitted until SSL probing is on.
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaAlertRuleGroup
metadata:
  name: static-pages-health
spec:
  instanceSelector:
    matchLabels:
      dashboards: grafana-cloud
  folderRef: applications
  name: static-pages-health
  interval: 1m
  rules:
    # --- Synthetic check: site unreachable from external probes -------------
    - uid: sp-synthetic-down
      title: Static Pages — synthetic check down
      condition: B
      for: 5m
      noDataState: OK
      execErrState: Error
      labels:
        severity: critical
        service: static-pages
        category: health
      annotations:
        summary: Static Pages is unreachable from external probes
        description: >-
          avg(probe_success) for the static-pages Synthetic Monitoring check has
          been below 0.5 for 5m — a majority of probe locations cannot reach the
          public site. Likely a real outage.
      data:
        - refId: A
          relativeTimeRange:
            from: 600
            to: 0
          datasourceUid: grafanacloud-prom
          model:
            datasource:
              type: prometheus
              uid: grafanacloud-prom
            editorMode: code
            expr: avg(probe_success{job="static-pages"})
            instant: true
            intervalMs: 1000
            maxDataPoints: 43200
            range: false
            refId: A
        - refId: B
          relativeTimeRange:
            from: 600
            to: 0
          datasourceUid: __expr__
          model:
            type: threshold
            datasource:
              type: __expr__
              uid: __expr__
            expression: A
            conditions:
              - type: query
                evaluator:
                  type: lt
                  params: [0.5]
                operator:
                  type: and
                query:
                  params: [A]
                reducer:
                  type: last
                  params: []
            refId: B

    # --- No pods scraped as up (hard down) ----------------------------------
    - uid: sp-target-absent
      title: Static Pages — no instances up
      condition: B
      for: 5m
      noDataState: Alerting
      execErrState: Error
      labels:
        severity: critical
        service: static-pages
        category: health
      annotations:
        summary: No Static Pages instances are up
        description: >-
          sum(up{job="static-pages"}) has been below 1 for 5m — no pod is being
          scraped successfully. The service is down or all pods are unhealthy.
      data:
        - refId: A
          relativeTimeRange:
            from: 600
            to: 0
          datasourceUid: grafanacloud-prom
          model:
            datasource:
              type: prometheus
              uid: grafanacloud-prom
            editorMode: code
            expr: sum(up{job="static-pages"})
            instant: true
            intervalMs: 1000
            maxDataPoints: 43200
            range: false
            refId: A
        - refId: B
          relativeTimeRange:
            from: 600
            to: 0
          datasourceUid: __expr__
          model:
            type: threshold
            datasource:
              type: __expr__
              uid: __expr__
            expression: A
            conditions:
              - type: query
                evaluator:
                  type: lt
                  params: [1]
                operator:
                  type: and
                query:
                  params: [A]
                reducer:
                  type: last
                  params: []
            refId: B

    # --- Running below the desired 2 replicas -------------------------------
    - uid: sp-under-replicated
      title: Static Pages — under-replicated
      condition: B
      for: 15m
      noDataState: OK
      execErrState: OK
      labels:
        severity: warning
        service: static-pages
        category: health
      annotations:
        summary: Static Pages is running below 2 replicas
        description: >-
          sum(up{job="static-pages"}) has been below 2 for 15m — the service is
          running without redundancy. A single further failure would cause an
          outage.
      data:
        - refId: A
          relativeTimeRange:
            from: 600
            to: 0
          datasourceUid: grafanacloud-prom
          model:
            datasource:
              type: prometheus
              uid: grafanacloud-prom
            editorMode: code
            expr: sum(up{job="static-pages"})
            instant: true
            intervalMs: 1000
            maxDataPoints: 43200
            range: false
            refId: A
        - refId: B
          relativeTimeRange:
            from: 600
            to: 0
          datasourceUid: __expr__
          model:
            type: threshold
            datasource:
              type: __expr__
              uid: __expr__
            expression: A
            conditions:
              - type: query
                evaluator:
                  type: lt
                  params: [2]
                operator:
                  type: and
                query:
                  params: [A]
                reducer:
                  type: last
                  params: []
            refId: B

    # --- Origin/gateway 5xx present right now (symptom; complements SLO burn) -
    - uid: sp-proxy-5xx
      title: Static Pages — elevated 5xx
      condition: B
      for: 10m
      noDataState: OK
      execErrState: OK
      labels:
        severity: warning
        service: static-pages
        category: health
      annotations:
        summary: Static Pages proxy is returning elevated 5xx
        description: >-
          The 5xx ratio on the page-serving proxy has exceeded 2% for 10m. This
          is the symptom signal that preceded the June 502 incident; the
          availability SLO error budget is also burning.
      data:
        - refId: A
          relativeTimeRange:
            from: 600
            to: 0
          datasourceUid: grafanacloud-prom
          model:
            datasource:
              type: prometheus
              uid: grafanacloud-prom
            editorMode: code
            expr: >-
              sum(rate(http_server_request_duration_seconds_count{service_name="static-pages", http_response_status_code=~"5.."}[5m]))
              /
              clamp_min(sum(rate(http_server_request_duration_seconds_count{service_name="static-pages"}[5m])), 0.001)
            instant: true
            intervalMs: 1000
            maxDataPoints: 43200
            range: false
            refId: A
        - refId: B
          relativeTimeRange:
            from: 600
            to: 0
          datasourceUid: __expr__
          model:
            type: threshold
            datasource:
              type: __expr__
              uid: __expr__
            expression: A
            conditions:
              - type: query
                evaluator:
                  type: gt
                  params: [0.02]
                operator:
                  type: and
                query:
                  params: [A]
                reducer:
                  type: last
                  params: []
            refId: B
