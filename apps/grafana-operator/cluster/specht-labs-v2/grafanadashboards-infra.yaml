# Infrastructure dashboards delivered to Grafana Cloud. JSON lives once in
# bases/grafana-dashboards/infrastructure/ and is delivered here via configMapRef
# (ConfigMaps generated by that base). instanceSelector binds them to the external
# Grafana Cloud instance defined in grafana.yaml.
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDashboard
metadata:
  name: hcloud-servers
spec:
  instanceSelector:
    matchLabels:
      dashboards: grafana-cloud
  folderRef: infrastructure
  configMapRef:
    name: hcloud-server-dashboard-json
    key: hcloud-server-dashboard.json
---
# Homelab infra dashboards. Their ${datasource} template variable defaults to the
# homelab tenant (Mimir (homelab) / uid mimir-homelab) so they show data straight
# after import; see apps/grafana-operator/.../grafanadatasources.yaml.
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDashboard
metadata:
  name: node-exporter
spec:
  instanceSelector:
    matchLabels:
      dashboards: grafana-cloud
  folderRef: infrastructure
  # node_exporter uses polystat panels; the operator installs the plugin on the
  # Grafana Cloud stack (SA has plugins:install).
  plugins:
    - name: grafana-polystat-panel
      version: "2.1.16"
  configMapRef:
    name: node-exporter-json
    key: node_exporter.json
---
