# Dashboards ported from the v1 cluster. JSON lives once in
# bases/grafana-dashboards/kubernetes-infra-apps/ and is delivered here via
# configMapRef (ConfigMaps generated by that base). instanceSelector binds them
# to the external Grafana Cloud instance defined in grafana.yaml.
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDashboard
metadata:
  name: argocd
spec:
  instanceSelector:
    matchLabels:
      dashboards: grafana-cloud
  folderRef: kubernetes-platform
  configMapRef:
    name: argocd-dashboard-json
    key: argocd-dashboard.json
---
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDashboard
metadata:
  name: cert-manager
spec:
  instanceSelector:
    matchLabels:
      dashboards: grafana-cloud
  folderRef: kubernetes-platform
  configMapRef:
    name: cert-manager-dashboard-json
    key: cert-manager-dashboard.json
