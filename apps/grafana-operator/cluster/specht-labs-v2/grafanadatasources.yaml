# Self-hosted LGTM datasources, pushed to Grafana Cloud (spechtlabs.grafana.net)
# by grafana-operator via the external Grafana CR in grafana.yaml — the same
# mechanism as the dashboards. gcx cannot create datasources (its datasources
# group is query-only), so these live here, not under grafana/.
#
# Each datasource reaches the v2 self-hosted stack (namespace lgtm) over Private
# Datasource Connect. enableSecureSocksProxy turns PDC on; secureSocksProxyUsername
# is the PDC connection id that binds the datasource to the grafana-pdc-agent
# tunnel. Grafana Cloud injects this automatically on a UI save but NOT on the
# operator's API create, so it is set explicitly here — without it queries do not
# route through PDC and fail with "An error occurred within the plugin".
#
# The stack is multi-tenant: X-Scope-OrgID selects the tenant (httpHeaderName1 +
# secureJsonData.httpHeaderValue1). One datasource per (backend, tenant), uid
# <backend>-<tenant>. Cross-signal links (logs↔traces↔metrics↔profiles) stay
# within the same tenant. Generated — keep tenant list in sync with the per-tenant
# HTTPRoutes in apps/{loki,tempo,mimir,pyroscope}/cluster/specht-labs-v2.


# ───────────────────────── tenant: homelab ─────────────────────────
---
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDatasource
metadata:
  name: mimir-homelab
spec:
  instanceSelector:
    matchLabels:
      dashboards: grafana-cloud
  datasource:
    name: Mimir (homelab)
    uid: mimir-homelab
    type: prometheus
    url: http://mimir-gateway.lgtm.svc.cluster.local/prometheus
    access: proxy
    isDefault: false
    editable: false
    jsonData:
      enableSecureSocksProxy: true
      secureSocksProxyUsername: ee5781eb-3e00-461e-873c-b11f65dbaacd
      pdcInjected: true
      httpHeaderName1: X-Scope-OrgID
      httpMethod: POST
      prometheusType: Mimir
      timeInterval: "60s"
      cacheLevel: Medium
    secureJsonData:
      httpHeaderValue1: homelab
---
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDatasource
metadata:
  name: loki-homelab
spec:
  instanceSelector:
    matchLabels:
      dashboards: grafana-cloud
  datasource:
    name: Loki (homelab)
    uid: loki-homelab
    type: loki
    url: http://loki-gateway.lgtm.svc.cluster.local
    access: proxy
    isDefault: false
    editable: false
    jsonData:
      enableSecureSocksProxy: true
      secureSocksProxyUsername: ee5781eb-3e00-461e-873c-b11f65dbaacd
      pdcInjected: true
      httpHeaderName1: X-Scope-OrgID
      maxLines: 1000
      derivedFields:
        - name: trace_id
          matcherRegex: "trace_id=(\\w+)"
          datasourceUid: tempo-homelab
          url: '${__value.raw}'
    secureJsonData:
      httpHeaderValue1: homelab
---
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDatasource
metadata:
  name: tempo-homelab
spec:
  instanceSelector:
    matchLabels:
      dashboards: grafana-cloud
  datasource:
    name: Tempo (homelab)
    uid: tempo-homelab
    type: tempo
    url: http://tempo-query-frontend.lgtm.svc.cluster.local:3100
    access: proxy
    isDefault: false
    editable: false
    jsonData:
      enableSecureSocksProxy: true
      secureSocksProxyUsername: ee5781eb-3e00-461e-873c-b11f65dbaacd
      pdcInjected: true
      httpHeaderName1: X-Scope-OrgID
      nodeGraph:
        enabled: true
      serviceMap:
        datasourceUid: mimir-homelab
      tracesToLogsV2:
        datasourceUid: loki-homelab
        spanStartTimeShift: "-1h"
        spanEndTimeShift: "1h"
        filterByTraceID: true
      tracesToProfiles:
        datasourceUid: pyroscope-homelab
        profileTypeId: "process_cpu:cpu:nanoseconds:cpu:nanoseconds"
    secureJsonData:
      httpHeaderValue1: homelab
---
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDatasource
metadata:
  name: pyroscope-homelab
spec:
  instanceSelector:
    matchLabels:
      dashboards: grafana-cloud
  datasource:
    name: Pyroscope (homelab)
    uid: pyroscope-homelab
    type: grafana-pyroscope-datasource
    url: http://pyroscope.lgtm.svc.cluster.local:4040
    access: proxy
    isDefault: false
    editable: false
    jsonData:
      enableSecureSocksProxy: true
      secureSocksProxyUsername: ee5781eb-3e00-461e-873c-b11f65dbaacd
      pdcInjected: true
      httpHeaderName1: X-Scope-OrgID
    secureJsonData:
      httpHeaderValue1: homelab

