apiVersion: v1
kind: List
items:
- apiVersion: cluster.x-k8s.io/v1beta2
  kind: MachineDeployment
  metadata:
    annotations: &annotations
      cluster.x-k8s.io/cluster-api-autoscaler-node-group-max-size: "2"
      cluster.x-k8s.io/cluster-api-autoscaler-node-group-min-size: "2"
    labels: &labels
      nodepool: worker-x86
    name: worker-x86-fsn
    namespace: default
  spec:
    clusterName: &clusterName specht-labs
    replicas: &replicas 2
    rollout:
      strategy: &strategy
        type: RollingUpdate
        rollingUpdate:
          maxSurge: 1
          maxUnavailable: 0
    selector:
      matchLabels: null
    template:
      metadata:
        labels: *labels
      spec:
        bootstrap: &bootstrap
          configRef:
            apiGroup: bootstrap.cluster.x-k8s.io
            kind: KubeadmConfigTemplate
            name: worker-template
        clusterName: *clusterName
        failureDomain: fsn1
        infrastructureRef: &infrastructureRef
          apiGroup: infrastructure.cluster.x-k8s.io
          kind: HCloudMachineTemplate
          name: worker-cx33-ubuntu-24-04
        version: &version v1.35.4

- apiVersion: cluster.x-k8s.io/v1beta2
  kind: MachineDeployment
  metadata:
    annotations:
      # hel1 is now an equal failure domain: with zone-aware RF3, each signal runs
      # one ingester set per region, so hel no longer monopolises the heavy Mimir
      # load. Two cx33 nodes here, same as nbg1/fsn1.
      cluster.x-k8s.io/cluster-api-autoscaler-node-group-max-size: "2"
      cluster.x-k8s.io/cluster-api-autoscaler-node-group-min-size: "2"
    labels: *labels
    name: worker-x86-hel
    namespace: default
  spec:
    clusterName: *clusterName
    replicas: 2
    rollout:
      strategy: *strategy
    selector:
      matchLabels: null
    template:
      metadata:
        labels: *labels
      spec:
        bootstrap: *bootstrap
        clusterName: *clusterName
        failureDomain: hel1
        infrastructureRef: *infrastructureRef
        version: *version

- apiVersion: cluster.x-k8s.io/v1beta2
  kind: MachineDeployment
  metadata:
    annotations: *annotations
    labels: *labels
    name: worker-x86-nbg
    namespace: default
  spec:
    clusterName: *clusterName
    replicas: *replicas
    rollout:
      strategy: *strategy
    selector:
      matchLabels: null
    template:
      metadata:
        labels: *labels
      spec:
        bootstrap: *bootstrap
        clusterName: *clusterName
        failureDomain: nbg1
        infrastructureRef: *infrastructureRef
        version: *version
