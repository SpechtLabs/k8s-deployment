---
# specht-labs's own in-cluster app profiles (when a profiler is later pointed
# here). This route adds external write/query access to the spechtlabs tenant.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: pyroscope-spechtlabs
  namespace: lgtm
spec:
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: tailnet
      namespace: envoy-gateway-system
      sectionName: http
  hostnames:
    - spechtlabs-pyroscope.k8s.specht-labs.de
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      filters:
        - type: RequestHeaderModifier
          requestHeaderModifier:
            set:
              - name: X-Scope-OrgID
                value: spechtlabs
      backendRefs:
        - group: ""
          kind: Service
          name: pyroscope
          port: 4040
          weight: 1
