apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: cert-manager

# v2 inflates the chart itself (instead of referencing ../../../bases/cert-manager) so it can
# enable Gateway API support without affecting the shared base used by labk3s/specht-labs.
helmCharts:
  - name: cert-manager
    repo: https://charts.jetstack.io
    version: v1.20.3
    releaseName: cert-manager
    namespace: cert-manager
    valuesFile: helm-values.yaml
