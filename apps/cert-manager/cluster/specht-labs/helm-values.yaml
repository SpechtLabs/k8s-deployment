# v2-specific cert-manager values. Kept in sync with apps/cert-manager/base/helm-values.yaml
# but adds Gateway API support, which only the v2 cluster (Envoy Gateway) needs. The shared
# base still serves labk3s/specht-labs (nginx ingress), so this divergence lives in the overlay.
fullnameOverride: cert-manager
replicaCount: 2
installCRDs: true

# Enable Gateway API support (cert-manager >= 1.15: Helm value, not a feature gate).
# Renders a ControllerConfiguration ConfigMap mounted via --config. Requires the Gateway
# API CRDs (installed by the envoy-gateway app) to be present. Drives the
# http01.gatewayHTTPRoute solver used by the v2 letsencrypt-prod ClusterIssuer.
config:
  enableGatewayAPI: true

global:
  leaderElection:
    namespace: cert-manager

# Resources: every component has an explicit MEMORY LIMIT to guard against
# OOM on the cx23 node (2 vCPU/3.9GiB). No CPU limits (avoids throttling);
# CPU requests only for scheduling/fair-share.
resources:
  requests:
    cpu: 50m
    memory: 96Mi
  limits:
    memory: 192Mi

webhook:
  replicaCount: 2
  resources:
    requests:
      cpu: 25m
      memory: 64Mi
    limits:
      memory: 128Mi

cainjector:
  replicaCount: 2
  resources:
    requests:
      cpu: 25m
      memory: 64Mi
    limits:
      memory: 128Mi

startupapicheck:
  resources:
    requests:
      cpu: 10m
      memory: 32Mi
    limits:
      memory: 64Mi

prometheus:
  enabled: true

  servicemonitor:
    enabled: true
