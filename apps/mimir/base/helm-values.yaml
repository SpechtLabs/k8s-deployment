# Right-sized single-replica Mimir for homelab scale (Kafka ingest-storage).
# Structural reference: grafana mimir-distributed/small.yaml, scaled to RF1 and
# 1 replica each.
#
# Resources: every component has an explicit MEMORY LIMIT. This is the guardrail
# that keeps a Mimir burst (e.g. an Alloy WAL-replay flood) from ballooning a pod
# and OOM-ing the whole cx23 node (which killed the kubelet on 2026-06-10). No CPU
# limits (avoids throttling); CPU requests only for scheduling/fair-share. Sized so
# even ingester+kafka co-located on one 3.9Gi node still leave headroom for the
# kubelet/cilium.

minio:
  enabled: false              # blocks live in Hetzner Object Storage, not bundled MinIO

alertmanager:
  enabled: false              # not needed for v1
ruler:
  enabled: false              # not needed for v1
rollout_operator:
  # Intentionally off even with zone-aware enabled: the rollout-operator must be a
  # single instance per namespace, and lgtm is shared by loki+tempo (which also
  # ship one). At 1 replica/zone (RF3), StatefulSet ordinal updates restart one
  # zone at a time on their own — coordinated multi-zone rollout isn't needed.
  enabled: false

global:
  extraEnvFrom:
    - secretRef:
        name: mimir-objstore  # provides AWS_ACCESS_KEY_ID / AWS_SECRET_ACCESS_KEY

distributor:
  replicas: 1
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      memory: 384Mi
querier:
  replicas: 1
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      memory: 512Mi
query_frontend:
  replicas: 1
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      memory: 384Mi
query_scheduler:
  replicas: 1
  resources:
    requests:
      cpu: 50m
      memory: 96Mi
    limits:
      memory: 256Mi
overrides_exporter:
  replicas: 1
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      memory: 128Mi

ingester:
  # Zone-aware RF3: 3 replicas total, one StatefulSet per zone (= per region), each
  # with its PVC provisioned in that region. topologyKey keeps zones off the same
  # node. Survives a full region loss (2/3 zones keep write quorum).
  replicas: 3
  zoneAwareReplication:
    enabled: true
    topologyKey: kubernetes.io/hostname
    zones: &mimirZones
      - name: zone-a
        nodeSelector:
          topology.kubernetes.io/region: hel1
      - name: zone-b
        nodeSelector:
          topology.kubernetes.io/region: nbg1
      - name: zone-c
        nodeSelector:
          topology.kubernetes.io/region: fsn1
  persistentVolume:
    enabled: true
    size: 10Gi
  # The heaviest component (holds the in-memory TSDB + WAL). Capped at 1.25Gi so a
  # replay flood OOM-kills THIS pod, never the node.
  resources:
    requests:
      cpu: 200m
      memory: 640Mi
    limits:
      memory: 1280Mi

store_gateway:
  # Zone-aware RF3, mirroring the ingester: one StatefulSet per region.
  replicas: 3
  zoneAwareReplication:
    enabled: true
    topologyKey: kubernetes.io/hostname
    zones: *mimirZones
  persistentVolume:
    enabled: true
    size: 5Gi
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      memory: 640Mi

compactor:
  replicas: 1
  persistentVolume:
    enabled: true
    size: 10Gi
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      memory: 640Mi

gateway:
  replicas: 1
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      memory: 192Mi

# Classic architecture (chart's classic-architecture.yaml): distributors push
# directly to ingesters, no Kafka ingest-storage. Kafka was a single-region SPOF in
# the write path; zone-aware RF3 ingesters provide durability instead (WAL on PVC +
# block flush to S3). See structuredConfig.ingest_storage.enabled: false below.
kafka:
  enabled: false

mimir:
  structuredConfig:
    multitenancy_enabled: true
    common:
      storage:
        backend: s3
        s3:
          endpoint: hel1.your-objectstorage.com
          bucket_name: specht-labs-mimir-blocks
          access_key_id: ${AWS_ACCESS_KEY_ID}
          secret_access_key: ${AWS_SECRET_ACCESS_KEY}
    ingester:
      ring:
        replication_factor: 3
      # classic mode: ingesters receive direct distributor pushes, not Kafka
      push_grpc_method_enabled: null
    store_gateway:
      sharding_ring:
        replication_factor: 3
    distributor:
      remote_timeout: null
    # Classic architecture: no Kafka ingest-storage (see kafka.enabled: false above).
    ingest_storage:
      enabled: false
      kafka:
        address: null
        topic: null
        auto_create_topic_default_partitions: null
