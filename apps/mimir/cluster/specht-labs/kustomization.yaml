apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: lgtm

resources:
  - ../../base
  - ./httproutes.yaml
  - ./homelab-ingress.route.yaml

generators:
  - ./secret-generator.yaml

# Region placement is now handled by zone-aware replication in base/helm-values.yaml
# (ingester + store_gateway run one zone per region). No blanket nodeSelector here:
# the stateless components schedule anywhere across the three regions.
