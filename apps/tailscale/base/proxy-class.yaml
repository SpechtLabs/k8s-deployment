# ProxyClass applied to every service/ingress proxy generated by the Tailscale
# operator (e.g. ts-envoy-* LoadBalancer proxy, egress proxies on labk3s).
# Referenced via proxyConfig.defaultProxyClass in tailscale.values.yaml.
#
# Sizing rationale (cx23: 2 vCPU / 3.9 GiB):
#   - The envoy/tailnet LB proxy has been observed using ~555m CPU under load.
#     150m request gives the scheduler fair placement without over-provisioning;
#     no CPU limit avoids throttling on a 2-vCPU node.
#   - 256Mi memory limit caps runaway usage while leaving headroom for other
#     components (Mimir, Loki, Tempo) on the same node.
apiVersion: tailscale.com/v1alpha1
kind: ProxyClass
metadata:
  name: homelab
spec:
  statefulSet:
    pod:
      tailscaleContainer:
        resources:
          requests:
            cpu: 150m
            memory: 64Mi
          limits:
            memory: 256Mi
