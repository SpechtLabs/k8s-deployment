# Cross-cluster ingestion for the homelab tenant via the tailnet gateway's own
# device hostname (k8s-load-balancer.sphinx-map.ts.net). labk3s egresses to this
# one device and routes by PATH instead of per-tenant Host. The /loki/ prefix
# covers push (/loki/api/v1/push) and query; X-Scope-OrgID is injected so the
# agent needs no tenant config. Coexists with the host-based homelab-loki route.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: loki-homelab-tailnet
  namespace: lgtm
spec:
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: tailnet
      namespace: envoy-gateway-system
      sectionName: http
  hostnames:
    - k8s-load-balancer.sphinx-map.ts.net
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /loki/
      filters:
        - type: RequestHeaderModifier
          requestHeaderModifier:
            set:
              - name: X-Scope-OrgID
                value: homelab
      backendRefs:
        - group: ""
          kind: Service
          name: loki-gateway
          port: 80
          weight: 1
