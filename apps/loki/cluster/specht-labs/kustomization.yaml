apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: lgtm

resources:
  - ../../base
  - ./httproutes.yaml
  - ./homelab-ingress.route.yaml
  - ./servicemonitor.yaml

generators:
  - ./secret-generator.yaml

# Region placement is now handled by zone-aware replication in base/helm-values.yaml
# (ingester runs one zone per region). No blanket nodeSelector: stateless Loki
# components schedule anywhere across the three regions.
