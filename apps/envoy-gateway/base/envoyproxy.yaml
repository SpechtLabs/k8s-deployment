apiVersion: gateway.envoyproxy.io/v1alpha1
kind: EnvoyProxy
metadata:
  name: hetzner-lb
  namespace: envoy-gateway-system
spec:
  provider:
    type: Kubernetes
    kubernetes:
      # Keep a local proxy endpoint on every schedulable worker. The Hetzner LB
      # targets nodes directly and externalTrafficPolicy: Local only accepts
      # traffic on nodes with a local Envoy pod.
      envoyDaemonSet:
        container:
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              memory: 512Mi
      envoyService:
        type: LoadBalancer
        externalTrafficPolicy: Local
        annotations:
          load-balancer.hetzner.cloud/location: "nbg1"
          load-balancer.hetzner.cloud/name: "cedi-dev-gateway-lb"
          load-balancer.hetzner.cloud/type: "lb11"
          load-balancer.hetzner.cloud/algorithm-type: "least_connections"
          load-balancer.hetzner.cloud/health-check-protocol: "tcp"
          load-balancer.hetzner.cloud/disable-private-ingress: "true"
