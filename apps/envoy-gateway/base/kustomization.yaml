apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: envoy-gateway-system

helmCharts:
  - name: gateway-helm
    repo: oci://docker.io/envoyproxy
    version: 1.8.3
    releaseName: envoy-gateway
    namespace: envoy-gateway-system
    valuesFile: helm-values.yaml
    # gateway-helm ships the Gateway API + Envoy Gateway CRDs in the chart's crds/
    # directory, which `helm template` skips by default. Without this the controller
    # installs but GatewayClass/EnvoyProxy/Gateway/HTTPRoute have no kind to bind to.
    includeCRDs: true

resources:
  - gatewayclass.yaml
  - envoyproxy.yaml
  - gateway.yaml
  - redirect-httproute.yaml
  - static-pages-certs.yaml
