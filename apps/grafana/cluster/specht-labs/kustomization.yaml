apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: observability

resources:
  - ../../base
  - ../../../../components/grafana-dashboards
  - ../../../../components/grafana-datasources
  #- ../../../../components/grafana-plugins

generators:
  - ./secret-generator.yaml

patches:
  - target:
      kind: Deployment
      group: apps
      version: v1
      name: grafana-pdc-agent
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 1
      - op: add
        path: "/spec/template/spec/tolerations"
        value:
        - key: arch
          operator: Equal
          value: amd64
          effect: NoSchedule
      - op: add
        path: "/spec/template/spec/nodeSelector"
        value:
          kubernetes.io/arch: amd64
