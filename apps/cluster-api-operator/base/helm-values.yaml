# Operator only — no core/bootstrap/controlPlane/infrastructure values, so the
# chart installs just the operator. Providers are declared as explicit CRs
# (core-provider.yaml etc.) for transparent diffs and per-provider version pins.
logLevel: 2
replicaCount: 1
leaderElection:
  enabled: true
# Resources: memory limit guards against OOM on cx23 (3.9 GiB). No CPU limit
# (avoids throttling). CPU/memory requests sized light for a homelab operator
# that mostly watches Provider CRs and delegates to provider controllers.
resources:
  manager:
    requests:
      cpu: 25m
      memory: 64Mi
    limits:
      cpu: null   # explicitly remove chart default of 100m — no CPU limits
      memory: 256Mi
