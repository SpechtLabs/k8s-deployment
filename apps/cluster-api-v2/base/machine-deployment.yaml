apiVersion: v1
kind: List
items:
- apiVersion: cluster.x-k8s.io/v1beta2
  kind: MachineDeployment
  metadata:
    annotations: &annotations
      cluster.x-k8s.io/cluster-api-autoscaler-node-group-max-size: "1"
      cluster.x-k8s.io/cluster-api-autoscaler-node-group-min-size: "1"
    labels: &labels
      nodepool: worker-x86
    name: worker-x86-fsn
    namespace: default
  spec:
    clusterName: &clusterName specht-labs
    replicas: &replicas 1
    rollout:
      strategy: &strategy
        type: RollingUpdate
        rollingUpdate:
          maxSurge: 1
          maxUnavailable: 0
    selector:
      matchLabels: null
    template:
      metadata:
        labels: *labels
      spec:
        bootstrap: &bootstrap
          configRef:
            apiGroup: bootstrap.cluster.x-k8s.io
            kind: KubeadmConfigTemplate
            name: worker-template
        clusterName: *clusterName
        failureDomain: fsn1
        infrastructureRef: &infrastructureRef
          apiGroup: infrastructure.cluster.x-k8s.io
          kind: HCloudMachineTemplate
          name: worker-cx23-ubuntu-24-04
        version: &version v1.35.4

- apiVersion: cluster.x-k8s.io/v1beta2
  kind: MachineDeployment
  metadata:
    annotations:
      # Two cx23 nodes in hel1: the extra one buys headroom for the self-hosted
      # Mimir and keeps its S3 traffic in-region (the object-storage bucket is in
      # hel1). min=max=2 so the autoscaler holds hel at 2, not the shared 1.
      cluster.x-k8s.io/cluster-api-autoscaler-node-group-max-size: "2"
      cluster.x-k8s.io/cluster-api-autoscaler-node-group-min-size: "2"
    labels: *labels
    name: worker-x86-hel
    namespace: default
  spec:
    clusterName: *clusterName
    replicas: 2
    rollout:
      strategy: *strategy
    selector:
      matchLabels: null
    template:
      metadata:
        labels: *labels
      spec:
        bootstrap: *bootstrap
        clusterName: *clusterName
        failureDomain: hel1
        infrastructureRef: *infrastructureRef
        version: *version

- apiVersion: cluster.x-k8s.io/v1beta2
  kind: MachineDeployment
  metadata:
    annotations: *annotations
    labels: *labels
    name: worker-x86-nbg
    namespace: default
  spec:
    clusterName: *clusterName
    replicas: *replicas
    rollout:
      strategy: *strategy
    selector:
      matchLabels: null
    template:
      metadata:
        labels: *labels
      spec:
        bootstrap: *bootstrap
        clusterName: *clusterName
        failureDomain: nbg1
        infrastructureRef: *infrastructureRef
        version: *version
