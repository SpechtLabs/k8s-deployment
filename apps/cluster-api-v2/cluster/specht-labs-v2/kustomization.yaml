apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: default

resources:
  - ../../base/

# SOPS-encrypted Hetzner API token, decrypted by ArgoCD's ksops plugin. The
# CAPH controller reads it via HetznerCluster.spec.hetznerSecretRef (secret
# `hetzner` in namespace default). Was previously applied by hand from
# manifests/deploy-secrets/; now GitOps-managed by the cluster-specht-labs app.
generators:
  - ./secret-generator.yaml

# ── Single source of truth for component versions ──────────────────────────
# Bump these three literals to upgrade the cluster. The `replacements` below
# propagate them into the KubeadmControlPlane, every MachineDeployment, and the
# `export …=` lines of both preKubeadmCommands blocks. See
# bases/cluster-api-v2/README.md for the full upgrade runbook.
#
# NOTE: server type and image are IMMUTABLE on HCloudMachineTemplate and are
# therefore NOT driven from here — change those via the rename+repoint pattern
# (see machine-template.yaml / README.md), not by editing this ConfigMap.
configMapGenerator:
  - name: cluster-config
    literals:
      - kubernetesVersion=v1.35.4
      - containerdVersion=2.3.1
      - runcVersion=1.2.5
    options:
      disableNameSuffixHash: true

replacements:
  # Kubernetes version → KCP spec.version, every MachineDeployment version, and
  # the `export KUBERNETES_VERSION=` line in both preKubeadmCommands blocks.
  - source:
      kind: ConfigMap
      name: cluster-config
      fieldPath: data.kubernetesVersion
    targets:
      - select:
          kind: KubeadmControlPlane
        fieldPaths:
          - spec.version
      - select:
          kind: MachineDeployment
        fieldPaths:
          - spec.template.spec.version
      - select:
          kind: KubeadmControlPlane
        fieldPaths:
          - spec.kubeadmConfigSpec.preKubeadmCommands.3   # export KUBERNETES_VERSION=
        options:
          delimiter: '='
          index: 1
      - select:
          kind: KubeadmConfigTemplate
        fieldPaths:
          - spec.template.spec.preKubeadmCommands.4       # export KUBERNETES_VERSION=
        options:
          delimiter: '='
          index: 1
  # containerd version → `export CONTAINERD=` in both preKubeadmCommands blocks.
  - source:
      kind: ConfigMap
      name: cluster-config
      fieldPath: data.containerdVersion
    targets:
      - select:
          kind: KubeadmControlPlane
        fieldPaths:
          - spec.kubeadmConfigSpec.preKubeadmCommands.1   # export CONTAINERD=
        options:
          delimiter: '='
          index: 1
      - select:
          kind: KubeadmConfigTemplate
        fieldPaths:
          - spec.template.spec.preKubeadmCommands.2       # export CONTAINERD=
        options:
          delimiter: '='
          index: 1
  # runc version → `export RUNC=` in both preKubeadmCommands blocks.
  - source:
      kind: ConfigMap
      name: cluster-config
      fieldPath: data.runcVersion
    targets:
      - select:
          kind: KubeadmControlPlane
        fieldPaths:
          - spec.kubeadmConfigSpec.preKubeadmCommands.2   # export RUNC=
        options:
          delimiter: '='
          index: 1
      - select:
          kind: KubeadmConfigTemplate
        fieldPaths:
          - spec.template.spec.preKubeadmCommands.3       # export RUNC=
        options:
          delimiter: '='
          index: 1
