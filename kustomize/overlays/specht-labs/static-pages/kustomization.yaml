apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: static-pages

resources:
  - ../../../bases/static-pages

generators:
  - ./secret-generator.yaml

images:
  - name: ghcr.io/spechtlabs/staticpages
    newTag: v0.2.0

patches:
  # v1 routes via the nginx Ingress (rendered from the base), not Gateway API. The base
  # also renders HTTPRoutes for the shared Envoy Gateway used on v2; drop them here so v1
  # (which has no such Gateway / may lack the Gateway API CRDs) keeps only the Ingress.
  - target:
      group: gateway.networking.k8s.io
      kind: HTTPRoute
      name: static-pages-api
    patch: |
      $patch: delete
      apiVersion: gateway.networking.k8s.io/v1
      kind: HTTPRoute
      metadata:
        name: static-pages-api
  - target:
      group: gateway.networking.k8s.io
      kind: HTTPRoute
      name: static-pages-proxy
    patch: |
      $patch: delete
      apiVersion: gateway.networking.k8s.io/v1
      kind: HTTPRoute
      metadata:
        name: static-pages-proxy
