# Replaces the chart's nginx Ingress on v2. Two routes reproduce the v1 routing:
#   pages.specht-labs.de/api -> static-pages-api:8081 (management API)
#   every served host /       -> static-pages-proxy:8080 (page content)
# Routes and backends share the static-pages namespace, so no ReferenceGrant is needed.
# parentRefs pin port: 443 so the routes attach ONLY to the HTTPS Terminate listeners and
# NOT the shared :80 http listener. Without this they bind to :80 too, where their specific
# hostname beats the platform 301 redirect (redirect-httproute.yaml) and the sites get
# served over plaintext HTTP instead of redirecting to HTTPS.
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: static-pages-api
  namespace: static-pages
spec:
  parentRefs:
    - name: shared
      namespace: envoy-gateway-system
      port: 443
  # /api is scoped to pages.specht-labs.de only (matches v1); on other hosts /api falls
  # through to the proxy route below.
  hostnames:
    - pages.specht-labs.de
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /api
      backendRefs:
        - name: static-pages-api
          port: 8081
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: static-pages-proxy
  namespace: static-pages
spec:
  parentRefs:
    - name: shared
      namespace: envoy-gateway-system
      port: 443
  # Include pages.specht-labs.de explicitly because the API route also has an exact
  # hostname for /api. Relying on wildcard fallback for / can leave the exact-host API
  # route as the only selected route for this host on some Gateway controllers.
  # Wildcards still cover one-level branch previews (e.g. branch.specht-labs.de).
  # For pages.specht-labs.de/api, the longer /api prefix on the API route wins.
  hostnames:
    - specht-labs.de
    - pages.specht-labs.de
    - "*.specht-labs.de"
    - gold-specht.de
    - "*.gold-specht.de"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: static-pages-proxy
          port: 8080
