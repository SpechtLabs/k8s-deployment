apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
spec:
  acme:
    email: letsencrypt@specht-labs.de
    privateKeySecretRef:
      name: letsencrypt-prod-acme-account-key
    server: https://acme-v02.api.letsencrypt.org/directory
    solvers:
      # v2 uses the Gateway API HTTP-01 solver (Envoy Gateway), not nginx ingress.
      # cert-manager attaches the challenge HTTPRoute to the shared Gateway's :80
      # listener via these parentRefs.
      - http01:
          gatewayHTTPRoute:
            parentRefs:
              - name: shared
                namespace: envoy-gateway-system
                kind: Gateway
                group: gateway.networking.k8s.io
