apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: cert-manager

# v2 defines its own letsencrypt-prod (Cloudflare DNS-01 solver) instead of referencing
# ../../../bases/cluster-issuer (nginx ingress solver, used by labk3s/specht-labs).
resources:
  - letsencrypt-prod.yaml

generators:
  - ./secret-generator.yaml
