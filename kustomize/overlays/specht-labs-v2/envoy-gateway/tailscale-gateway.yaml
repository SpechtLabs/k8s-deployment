# Private tailnet Gateway. App overlays can attach HTTPRoute or TLSRoute resources
# here when they should only be reachable through Tailscale.
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: tailnet
  namespace: envoy-gateway-system
spec:
  gatewayClassName: envoy-tailscale
  listeners:
    - name: http
      protocol: HTTP
      port: 80
      allowedRoutes:
        namespaces:
          from: All
    - name: tls
      protocol: TLS
      port: 443
      tls:
        mode: Passthrough
      allowedRoutes:
        kinds:
          - group: gateway.networking.k8s.io
            kind: TLSRoute
        namespaces:
          from: All
