apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: argocd

resources:
  - ../../../bases/argocd/
  # v2 exposes ArgoCD through the Envoy Gateway (TLS passthrough) instead of an Ingress.
  - certificate.yaml
  - tlsroute.yaml

generators:
  - ./secret-generator.yaml

patchesJson6902:
  - target:
      kind: Role
      namespace: argocd
      name: argocd-server
    path: webterminal-role.patch.yaml

patches:
  # Drop the nginx Ingress the chart renders (server.ingress.enabled in the shared base);
  # v2 routes via the TLSRoute above. Base stays unchanged for labk3s/specht-labs.
  - target:
      kind: Ingress
      name: argocd-server
    patch: |
      $patch: delete
      apiVersion: networking.k8s.io/v1
      kind: Ingress
      metadata:
        name: argocd-server
  # The shared Helm values keep the existing cluster's public URL. Override it for v2.
  - target:
      kind: ConfigMap
      name: argocd-cm
    patch: |
      apiVersion: v1
      kind: ConfigMap
      metadata:
        name: argocd-cm
      data:
        url: https://argocd.k8s.specht-labs.de
        dex.config: |
          connectors:
            - type: oidc
              id: oidc
              name: Tailscale
              config:
                issuer: https://idp.sphinx-map.ts.net
                clientID: $argocd-oidc:tailscale.clientID
                clientSecret: $argocd-oidc:tailscale.clientSecret
                redirectURI: https://argocd.k8s.specht-labs.de/api/dex/callback
                scopes:
                  - openid
                getUserInfo: true
                Default: username
                claimMapping:
                  Default: username
  # argocd full metrics go to the self-hosted
  # Mimir via its ServiceMonitors (prometheusOperatorObjects -> selfhosted-mimir).
  # Additionally scrape argocd-server's metrics port to Grafana Cloud via
  # annotation-autodiscovery so the Knowledge Graph keeps its grpc_server RED.
  # The grafana-k8s-monitoring Cloud destination keeps only grpc_server_* from
  # job "argocd-server" and drops the rest of this (duplicate) scrape.
  # Annotations are inlined here (not the scrape-to-cloud component) because a
  # Component's labelSelector can't see a label added by an overlay patch.
  - target:
      kind: Deployment
      name: argocd-server
    patch: |
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: argocd-server
      spec:
        template:
          metadata:
            annotations:
              k8s.grafana.com/scrape: "true"
              k8s.grafana.com/metrics.portName: "metrics"
              k8s.grafana.com/job: "argocd-server"
