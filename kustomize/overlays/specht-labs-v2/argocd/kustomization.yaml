apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: argocd

resources:
  - ../../../bases/argocd/
  # v2 exposes ArgoCD through the Envoy Gateway (TLS passthrough) instead of an Ingress.
  - certificate.yaml
  - tlsroute.yaml

generators:
  - ./secret-generator.yaml

patchesJson6902:
  - target:
      kind: Role
      namespace: argocd
      name: argocd-server
    path: webterminal-role.patch.yaml

patches:
  # Drop the nginx Ingress the chart renders (server.ingress.enabled in the shared base);
  # v2 routes via the TLSRoute above. Base stays unchanged for labk3s/specht-labs.
  - target:
      kind: Ingress
      name: argocd-server
    patch: |
      $patch: delete
      apiVersion: networking.k8s.io/v1
      kind: Ingress
      metadata:
        name: argocd-server
  # The shared Helm values keep the existing cluster's public URL. Override it for v2.
  - target:
      kind: ConfigMap
      name: argocd-cm
    patch: |
      apiVersion: v1
      kind: ConfigMap
      metadata:
        name: argocd-cm
      data:
        url: https://argocd.v2.specht-labs.de
        dex.config: |
          connectors:
            - type: oidc
              id: oidc
              name: Tailscale
              config:
                issuer: https://idp.sphinx-map.ts.net
                clientID: $argocd-oidc:tailscale.clientID
                clientSecret: $argocd-oidc:tailscale.clientSecret
                redirectURI: https://argocd.v2.specht-labs.de/api/dex/callback
                scopes:
                  - openid
                getUserInfo: true
                Default: username
                claimMapping:
                  Default: username
