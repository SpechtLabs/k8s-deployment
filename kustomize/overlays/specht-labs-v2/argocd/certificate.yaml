# Real Let's Encrypt cert for argocd-server. With TLS passthrough the gateway does not
# terminate, so argocd-server serves this itself: it auto-loads the well-known
# `argocd-server-tls` secret. cert-manager solves HTTP-01 through the shared Gateway's
# :80 listener (see the v2 letsencrypt-prod ClusterIssuer parentRefs).
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: argocd-server-tls
  namespace: argocd
spec:
  secretName: argocd-server-tls
  dnsNames:
    - argocd.specht-labs.de
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
    group: cert-manager.io
