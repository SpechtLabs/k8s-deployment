apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: grafana-operator

helmCharts:
  - name: grafana-operator
    repo: https://grafana.github.io/helm-charts
    version: 5.24.0
    releaseName: grafana-operator
    namespace: grafana-operator
    valuesFile: grafana-operator-values.yaml

resources:
  # Shared dashboard JSON → ConfigMaps (one source of truth with the v1 cluster).
  - ../../../bases/grafana-dashboards/kubernetes-infra-apps
  - ../../../bases/grafana-dashboards/envoy-gateway
  - grafana.yaml
  - grafanadashboards.yaml
  - grafanadashboards-envoy.yaml

generators:
  - secret-generator.yaml
