# Infrastructure dashboards delivered to Grafana Cloud. JSON lives once in
# bases/grafana-dashboards/infrastructure/ and is delivered here via configMapRef
# (ConfigMaps generated by that base). instanceSelector binds them to the external
# Grafana Cloud instance defined in grafana.yaml.
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDashboard
metadata:
  name: hcloud-servers
spec:
  instanceSelector:
    matchLabels:
      dashboards: grafana-cloud
  folderRef: infrastructure
  configMapRef:
    name: hcloud-server-dashboard-json
    key: hcloud-server-dashboard.json
