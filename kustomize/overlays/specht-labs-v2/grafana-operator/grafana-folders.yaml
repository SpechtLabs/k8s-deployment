# GrafanaFolder hierarchy for first-party dashboards/alerts on the external Grafana
# Cloud instance. Each folder pins `uid:` to the folder the operator already created
# from the dashboards' former `folder:` strings, so the operator renames/reparents
# them IN PLACE instead of creating duplicate-titled folders. Dashboards and alert
# rules reference these by folderRef.
#
# Layout:
#   Infrastructure          — cloud / hardware (hcloud servers)
#   Kubernetes Platform     — cluster add-ons (argocd, cert-manager)
#     └─ Envoy Gateway      — ingress / networking (nested)
#   Applications            — first-party apps (static-pages)
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaFolder
metadata:
  name: infrastructure
spec:
  instanceSelector:
    matchLabels:
      dashboards: grafana-cloud
  uid: bfongr6rqsbnkb
  title: "Infrastructure"
---
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaFolder
metadata:
  name: kubernetes-platform
spec:
  instanceSelector:
    matchLabels:
      dashboards: grafana-cloud
  # was the "Kubernetes Infra Apps" folder — renamed in place via its existing uid.
  uid: afomtf2umwo3ka
  title: "Kubernetes Platform"
---
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaFolder
metadata:
  name: envoy-gateway
spec:
  instanceSelector:
    matchLabels:
      dashboards: grafana-cloud
  uid: afon5mmmnjugwf
  title: "Envoy Gateway"
  # Nest the gateway dashboards under the platform folder (ingress/networking).
  parentFolderRef: kubernetes-platform
---
# Shared "Applications" folder for first-party app telemetry (dashboards + alert
# rules). Static Pages dashboard and its health-check alert group reference this
# via folderRef. (uid omitted — already operator-managed; left unchanged.)
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaFolder
metadata:
  name: applications
spec:
  instanceSelector:
    matchLabels:
      dashboards: grafana-cloud
  title: "Applications"
