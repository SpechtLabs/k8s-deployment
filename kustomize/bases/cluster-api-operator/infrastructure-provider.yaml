apiVersion: operator.cluster.x-k8s.io/v1alpha2
kind: InfrastructureProvider
metadata:
  name: hetzner
  namespace: caph-system
  annotations:
    argocd.argoproj.io/sync-wave: "1"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  version: v1.1.6
  # HA for the CAPH controller + webhook. A single replica is a SPOF: on
  # 2026-06-10 a worker node died, the lone caph webhook became unreachable, and
  # MachineHealthCheck remediation failed ("no route to host" creating the
  # HCloudRemediation) — the cluster couldn't self-heal the dead node. Two
  # replicas on different nodes keep the webhook reachable through a node loss.
  # (Replaces the earlier live `kubectl patch`, which the operator reconciled
  # back to 1.) The provider-default control-plane toleration lets a replica
  # land on a CP node, away from worker churn.
  deployment:
    replicas: 2
    affinity:
      podAntiAffinity:
        requiredDuringSchedulingIgnoredDuringExecution:
          - labelSelector:
              matchLabels:
                cluster.x-k8s.io/provider: infrastructure-hetzner
            topologyKey: kubernetes.io/hostname
