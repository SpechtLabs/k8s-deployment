cluster:
  name: specht-labs
global:
  # Pin metrics collection to 1/min to cap Grafana Cloud DPM (cost lever).
  # This is also the chart default; set explicitly so a chart bump can't
  # silently lower it. Per-feature/ServiceMonitor intervals inherit this
  # unless they set their own.
  scrapeInterval: 60s
destinations:
  grafana-cloud-metrics:
    type: prometheus
    url: https://prometheus-prod-65-prod-eu-west-2.grafana.net./api/prom/push
    auth:
      type: basic
      username: "3276426" 
      password: REPLACE_ME
    metricProcessingRules: |
      write_relabel_config {
        regex = "container_id|image_id"
        action = "labeldrop"
      }
      // --- Cost control: drop leaf metrics nothing queries (Tier 1) ---
      // Envoy proxy stats: ~4.5k series. Not a Knowledge Graph input; no
      // dashboards/SLOs/alerts reference them.
      write_relabel_config {
        source_labels = ["__name__"]
        regex = "envoy_.*"
        action = "drop"
      }
      // hcloud-exporter: ~365 series, only ever manually explored.
      write_relabel_config {
        source_labels = ["__name__"]
        regex = "hcloud_.*"
        action = "drop"
      }
      // ArgoCD's own exporter metrics (workqueue/go/controller/rest_client
      // histograms ~3.7k series): drop everything from the argocd.* jobs EXCEPT
      // grpc_server_*, which the Knowledge Graph consumes for service RED.
      // Scoped by `job` (NOT namespace) so kube-state/cAdvisor series ABOUT
      // argocd workloads — which the K8s Monitoring app and KG entity model
      // need — are left untouched. RE2 has no negative lookahead, so protect
      // grpc_server_* with a temp keep-marker label, then drop the rest.
      write_relabel_config {
        source_labels = ["job", "__name__"]
        separator = ";"
        regex = "argocd.*;grpc_server.*"
        target_label = "__tmp_keep_argocd"
        replacement = "keep"
      }
      write_relabel_config {
        source_labels = ["job", "__tmp_keep_argocd"]
        separator = ";"
        regex = "argocd.*;"
        action = "drop"
      }
      write_relabel_config {
        regex = "__tmp_keep_argocd"
        action = "labeldrop"
      }
  grafana-cloud-logs:
    type: loki
    url: https://logs-prod-012.grafana.net./loki/api/v1/push
    auth:
      type: basic
      username: "1633888"
      password: REPLACE_ME
  gc-otlp-endpoint:
    type: otlp
    url: https://otlp-gateway-prod-eu-west-2.grafana.net./otlp
    protocol: http
    auth:
      type: basic
      username: "1676101"
      password: REPLACE_ME
    metrics:
      enabled: true
    logs:
      enabled: true
    traces:
      enabled: true
    processors:
      transform:
        metrics:
          resource:
            - delete_key(attributes, "container_id")
            - delete_key(attributes, "image_id")
          datapoint:
            - delete_key(attributes, "container_id")
            - delete_key(attributes, "image_id")
  grafana-cloud-profiles:
    type: pyroscope
    url: https://profiles-prod-002.grafana.net.:443
    auth:
      type: basic
      username: "1676101"
      password: REPLACE_ME
clusterMetrics:
  enabled: true
  collector: alloy-metrics
hostMetrics:
  enabled: true
  collector: alloy-metrics
  linuxHosts:
    enabled: true
  windowsHosts:
    enabled: false
  energyMetrics:
    enabled: false
costMetrics:
  enabled: true
  collector: alloy-metrics
annotationAutodiscovery:
  enabled: true
  collector: alloy-metrics
# Scrape Prometheus-Operator ServiceMonitors/PodMonitors/Probes cluster-wide
# (e.g. ArgoCD ships its own ServiceMonitors that annotation autodiscovery misses).
prometheusOperatorObjects:
  enabled: true
  collector: alloy-metrics
clusterEvents:
  enabled: true
  collector: alloy-singleton
nodeLogs:
  enabled: true
  collector: alloy-logs
podLogsViaLoki:
  enabled: true
  collector: alloy-logs
kubernetesManifests:
  enabled: true
  collector: alloy-singleton
applicationObservability:
  enabled: true
  collector: alloy-receiver
  receivers:
    otlp:
      grpc:
        enabled: true
        port: 4317
      http:
        enabled: true
        port: 4318
    zipkin:
      enabled: true
      port: 9411
autoInstrumentation:
  # Tier 2 cost control: Beyla eBPF RED (~4.7k series) is largely redundant with
  # span metrics from traces (applicationObservability stays enabled). Disabling
  # loses eBPF RED + KG network-flow edges for services that emit no traces
  # (e.g. nginx/static-pages). Re-enable if you miss RED on untraced workloads.
  enabled: false
  collector: alloy-metrics
  beyla:
    deliverTracesToApplicationObservability: true
profiling:
  enabled: true
  collector: alloy-profiles
  # The chart requires at least one profiling type when profiling is enabled.
  # eBPF matches the alloy-profiles collector's privileged + daemonset presets.
  ebpf:
    enabled: true
collectors:
  alloy-metrics:
    presets:
      - clustered
      - statefulset
  alloy-singleton:
    presets:
      - singleton
  alloy-logs:
    presets:
      - filesystem-log-reader
      - daemonset
  alloy-receiver:
    presets:
      - deployment
  alloy-profiles:
    presets:
      - privileged
      - daemonset
collectorCommon:
  alloy:
    remoteConfig:
      enabled: true
      url: https://fleet-management-prod-011.grafana.net
      auth:
        type: basic
        username: "1676101"
        password: REPLACE_ME
telemetryServices:
  kube-state-metrics:
    deploy: true
  node-exporter:
    deploy: true
  windows-exporter:
    deploy: false
  opencost:
    deploy: true
    metricsSource: grafana-cloud-metrics
    opencost:
      exporter:
        defaultClusterId: specht-labs
      prometheus:
        existingSecretName: grafana-cloud-metrics-grafana-k8s-monitoring
        external:
          url: https://prometheus-prod-65-prod-eu-west-2.grafana.net./api/prom
      customPricing:
        enabled: true
        costModel:
          description: Hetzner Cloud CPX22 pricing, net EUR.
          CPU: 0.0032
          RAM: 0.0016
          GPU: 0
          storage: 0
          zoneNetworkEgress: 0
          regionNetworkEgress: 0
          internetNetworkEgress: 1
  kepler:
    deploy: false
  k8s-manifest-tail:
    deploy: true
    config:
      objects:
        - apiVersion: v1
          kind: Pod
        - apiVersion: apps/v1
          kind: Deployment
        - apiVersion: apps/v1
          kind: StatefulSet
        - apiVersion: apps/v1
          kind: DaemonSet
