# Platform shared Gateway. Listeners:
#   :80 (http)
#     - serves ACME HTTP-01 challenges (cert-manager injects a high-precedence
#       /.well-known/acme-challenge/... HTTPRoute that wins over the catch-all redirect)
#     - serves the platform HTTP->HTTPS 301 redirect (redirect-httproute.yaml)
#   :443 TLS listeners (matched by SNI)
#     - TLS now uses Cloudflare DNS-01, so wildcard certs are possible: a single
#       Terminate listener per wildcard hostname (e.g. *.specht-labs.de) covers many
#       app hosts at once. Apps that let the gateway terminate TLS add a Terminate
#       listener + cert Secret; apps that terminate their own TLS (e.g. ArgoCD, which
#       needs gRPC + REST on one port) add a Passthrough listener matched by SNI and
#       a TLSRoute to their backend. A wildcard label matches exactly one DNS label, so
#       *.specht-labs.de does NOT shadow the two-label argocd.v2.specht-labs.de.
#
# All app listeners accumulate here (single Gateway => single Envoy + single Hetzner
# LB, ~9 EUR each, so we do NOT use a Gateway-per-app). The matching route lives with
# the app (in its overlay/base).
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: shared
  namespace: envoy-gateway-system
spec:
  gatewayClassName: envoy
  listeners:
    - name: http
      protocol: HTTP
      port: 80
      allowedRoutes:
        namespaces:
          from: All
    # ArgoCD: TLS passthrough. argocd-server terminates its own TLS so gRPC and REST
    # work on the same port; the gateway only routes by SNI. Paired with the TLSRoute
    # in the argocd overlay and the cert-manager Certificate that fills argocd-server-tls.
    - name: argocd-tls
      protocol: TLS
      port: 443
      hostname: argocd.v2.specht-labs.de
      tls:
        mode: Passthrough
      allowedRoutes:
        kinds:
          - group: gateway.networking.k8s.io
            kind: TLSRoute
        namespaces:
          from: All
    # StaticPages: gateway-terminated TLS. All four listeners share the one wildcard
    # Secret static-pages-tls (cert-manager, Cloudflare DNS-01, see static-pages-certs.yaml).
    # Routes live in the static-pages overlay (httproute.yaml). Wildcard listeners match a
    # single label; apexes need their own listeners.
    - name: specht-labs-wildcard
      protocol: HTTPS
      port: 443
      hostname: "*.specht-labs.de"
      tls:
        mode: Terminate
        certificateRefs:
          - kind: Secret
            name: static-pages-tls
      allowedRoutes:
        namespaces:
          from: All
    - name: specht-labs-apex
      protocol: HTTPS
      port: 443
      hostname: specht-labs.de
      tls:
        mode: Terminate
        certificateRefs:
          - kind: Secret
            name: static-pages-tls
      allowedRoutes:
        namespaces:
          from: All
    - name: gold-specht-wildcard
      protocol: HTTPS
      port: 443
      hostname: "*.gold-specht.de"
      tls:
        mode: Terminate
        certificateRefs:
          - kind: Secret
            name: static-pages-tls
      allowedRoutes:
        namespaces:
          from: All
    - name: gold-specht-apex
      protocol: HTTPS
      port: 443
      hostname: gold-specht.de
      tls:
        mode: Terminate
        certificateRefs:
          - kind: Secret
            name: static-pages-tls
      allowedRoutes:
        namespaces:
          from: All
