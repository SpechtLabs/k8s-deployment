apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Plain ConfigMap holding the Static Pages dashboard JSON, consumed by the
# grafana-operator GrafanaDashboard `configMapRef` on the v2 / Grafana Cloud
# cluster. The v1 self-hosted-Grafana sidecar path instead generates a labeled
# ConfigMap from the parent kustomization (../kustomization.yaml). Both reuse the
# same JSON file.
configMapGenerator:
  - name: static-pages-overview-json
    options:
      disableNameSuffixHash: true
    files:
      - static-pages.json
