apiVersion: v1
kind: List
items:
  # HCloudMachineTemplate.spec is IMMUTABLE. To change an immutable field
  # (type / imageName / sshKeys / placementGroupName) create a NEW template
  # with a new, spec-encoded name following <role>-<servertype>-<image-slug>
  # and repoint the referencing infrastructureRef. See README.md.
  - apiVersion: infrastructure.cluster.x-k8s.io/v1beta1
    kind: HCloudMachineTemplate
    metadata:
      name: worker-cx23-ubuntu-24-04
      namespace: default
      labels: &labels
        cluster.x-k8s.io/cluster-name: &clusterName "specht-labs"
    spec:
      template:
        spec:
          imageName: &ubunut_24_04 ubuntu-24.04
          placementGroupName: &worker_placement_group worker-nodes
          type: cx23
          sshKeys: &ssh_keys
            - name: cedi@zia

  - apiVersion: infrastructure.cluster.x-k8s.io/v1beta1
    kind: HCloudMachineTemplate
    metadata:
      name: control-plane-cx23-ubuntu-24-04
      namespace: default
      labels: *labels
    spec:
      template:
        spec:
          imageName: *ubunut_24_04
          placementGroupName: control-plane
          type: cx23
          sshKeys: *ssh_keys
