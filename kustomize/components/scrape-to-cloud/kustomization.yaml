apiVersion: kustomize.config.k8s.io/v1alpha1
kind: Component

# scrape-to-cloud — opt a workload INTO Grafana Cloud metrics ingestion.
#
# Default routing (see grafana-k8s-monitoring helm-values): every
# ServiceMonitor/PodMonitor/Probe scrape goes to the self-hosted Mimir. This
# component makes the annotation-autodiscovery feature ALSO scrape the workload
# and send it to Grafana Cloud (for the metrics that need Cloud features).
#
# It adds `k8s.grafana.com/scrape: "true"` to the pod template of any
# Deployment/StatefulSet that carries the label
# `grafana.specht-labs.de/scrape-to-cloud: "true"`.
#
# IMPORTANT: the label must be present on the resource as authored (in your
# base/manifest), NOT added via an overlay patch — a Component's labelSelector
# runs before the parent kustomization's patches. For third-party chart
# resources you only patch (e.g. argocd-server), set the
# `k8s.grafana.com/scrape`/`metrics.portName`/`job` annotations directly in your
# overlay patch instead of using this component.
#
# Usage (own app whose manifest you control):
#   # in the workload manifest:
#   metadata:
#     labels:
#       grafana.specht-labs.de/scrape-to-cloud: "true"
#   spec:
#     template:
#       metadata:
#         annotations:
#           k8s.grafana.com/metrics.portName: "metrics"   # or metrics.portNumber: "9090"
#   # in the overlay kustomization.yaml:
#   components:
#     - ../../../components/scrape-to-cloud

patches:
  - target:
      kind: Deployment
      labelSelector: grafana.specht-labs.de/scrape-to-cloud=true
    patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: scrape-to-cloud-target   # ignored; target labelSelector selects
      spec:
        template:
          metadata:
            annotations:
              k8s.grafana.com/scrape: "true"
  - target:
      kind: StatefulSet
      labelSelector: grafana.specht-labs.de/scrape-to-cloud=true
    patch: |-
      apiVersion: apps/v1
      kind: StatefulSet
      metadata:
        name: scrape-to-cloud-target
      spec:
        template:
          metadata:
            annotations:
              k8s.grafana.com/scrape: "true"
