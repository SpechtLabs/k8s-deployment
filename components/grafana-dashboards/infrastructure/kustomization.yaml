apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Plain ConfigMaps holding the dashboard JSON, consumed by the grafana-operator
# GrafanaDashboard `configMapRef` on the v2 / Grafana Cloud cluster. The v1
# self-hosted-Grafana sidecar path instead generates labeled ConfigMaps from the
# parent kustomization (../kustomization.yaml). Both reuse the same JSON files.
configMapGenerator:
  - name: hcloud-server-dashboard-json
    options:
      disableNameSuffixHash: true
    files:
      - hcloud-server-dashboard.json
  # Homelab infra dashboards (default datasource: mimir-homelab tenant).
  - name: node-exporter-json
    options:
      disableNameSuffixHash: true
    files:
      - node_exporter.json
  - name: rpi-dashboard-json
    options:
      disableNameSuffixHash: true
    files:
      - rpi_dashboard.json
  - name: synology-dashboard-json
    options:
      disableNameSuffixHash: true
    files:
      - synology-dashboard.json
  - name: adguardhome-exporter-json
    options:
      disableNameSuffixHash: true
    files:
      - adguardhome_exporter.json
  - name: cert-checker-json
    options:
      disableNameSuffixHash: true
    files:
      - cert-checker.json
  - name: tailscale-json
    options:
      disableNameSuffixHash: true
    files:
      - tailscale.json
